body:
  text: 門人德亮編書記德峨錄順治庚寅歲師於蘇州府吳江縣羅漢寺受紹興府山會護法縉紳羅夢章鄭望裕邢淇瞻李泰若徐岱淵唐敏一吳期生吳崆峒陶岸生魯季栗童在公劉嵢嶁劉永侯劉靜甫劉伯繩諸大居士同文學裘孫劉諸檀越并法侶妙德聖意等請拄戒珠寺九月二十五日入院法語山門巍然突露頓絕遮攔古今卓立迥別尋常龍象蹴踏作麼商量喝一喝云入得此門須奉重不勞門外覓餘光王右軍像師指像云灑灕麗於枯藤奪崖透石鼓雲雷於掌上驟雨旋風猶未是此翁妙用且道斯意如何昔年捨宅為僧寺萬古輝煌作棟樑韋馱殿我主正汝摧邪兩兩行來步不移今日相看擔荷此從教祖道徹玄微大殿三千七百年已前此老不與麼三千七百年以後此老卻與麼與麼不與麼放過一著且看新長老作何去就展坐具云源遠流長遂作禮伽藍殿昔受靈山付囑從來毫不放人邪正分於當下那肯綽約疏親插香云今日煆凡煉聖仗君保護弘深祖師室西天四七總是婆婆和和東土二三兩口何無一舌怎奈祖禰不了到處被伊殃及插香云觸斷兩頭機三更湧紅日方丈正法眼藏一錘擊碎涅槃妙心是甚壒𡒁按住杖云拶透石人骨髓剔出金剛眼睛任汝三頭六臂到來無地容身是日應林闍黎設供眾請上堂師至座前憲副羅夢章捧疏師接得拈起云此是羅居士同諸檀護不忘靈山付囑要與當人徹頭徹尾既然文彩已彰何必重添眉目顧左右云事因叮囑起度疏維那宣畢師指座云人人可踏個個堪承更欲山僧扭捏作麼不是符到奉行看取一場熱亂陞座拈香云此一瓣香根盤大地法遍塵沙芬芳那畔已前結秀不萌枝上驀地拈來供養始祖釋迦文佛普願無盡含識聞茲契悟永斷疑根此一瓣香天然尊貴不假功勛奉祝九五之至尊伏願德以時化國以時寧此一瓣香經天緯地左右司衡奉為本省府鎮道臺府邑各衙文武尊官願祈共輔皇綱庇恩萬姓此一瓣香宿承願力擁護法壇奉為本山護法大宰官羅王鄭邢吳陶魯劉等大居士共徹劫外風光永作皇畿柱石此一瓣香弁峰砍額蕺嶺揚眉供養本山中開法運龍華瑞白師翁惟祈燈燈無盡道利人天復從懷中拈出香云此一瓣香不住正偏寧居玄要昔日紫霞納敗今朝蕺嶺款陳第二番拈出供養傳菩提達磨正宗第四十三世天台先師嘯雲老和尚用酬法乳之恩維那白椎云法筵龍象眾當觀第一義師豎拂云越古超今分外奇個中消息絕思惟當臺寶鏡無私蔽果自男兒不自欺山僧出吳門登越地船來陸來敲冰踏凍霜花含夜月徹骨且風流越地吳山隨方任運所以道是法住法位世間相常住與麼擔荷何必開眼受瞞諸公聞如是舉唱便作平常是道麼且喜沒交涉應知打麵還他州土麥唱歌須是帝鄉人殆今參玄之士不務本實惟以裝載禪道佛法為事一見師家平實為人便生大我慢若稍立參機如蠅聚唾較量將來有甚底止豈不聞石頭大師云執事元是迷契理亦非悟門門一切境回互不回互回而更相涉不爾依位住諸昆仲此是我洞上法幢所由立也五位正偏三種滲漏不出此也上士聞之識病識藥中下聞之笑而不顧通身入水不知鼻酸須知死中應發活活中應令死然後通身遍身羅籠不肯住呼喚不回頭參學分中少許話會勿則門外支離沿途荊棘山僧事不獲已蓋緣先師殃累當時今日不顧拖泥帶水向人天眾前熱亂一番貴在全身領荷知重識輕于中還有共扶玄化者麼顧左右良久擊拂云高山流水齊爭調嬴得白雲出岫忙問明暗雙機學人不易如何是渠今正是我師云蠱毒之鄉水莫嘗如何是我今不是渠師云死貓頭子幾人換進云秪如洞山睹影與高峰墮枕相去幾何師便棒云驢唇馬嘴漢莫謗他好進云秪如和尚高陞此座法利人天祖父孫源一門超出秦望山還解點首否師云急急如律令又僧問雲門鼓笛弁嶽巴歌請師別出腔調師搖拂云若遇知音不勞賞鑑進云露柱子𨁝跳擊碎寶華王座和尚還許學人再參否師云東壁掛葫蘆僧作禮起遶身一匝而出師喝云好個猢猻圈參頭結椎云諦觀法王法法王法如是當晚小參有一語全規矩擬思量帶伴侶新長老口如匾擔不解談玄說妙亦無規矩可全亦無伴侶可帶又云一生參學事無成慇勤抱得旃檀樹此二句今人錯會其意更兼覺範老漢錯下註腳總之字經三寫烏焉成馬何似蘆花深處客夜深不坐釣漁磯諸公以入院之初更要蕺山立新條令絕斷龍門宿客看來也是醉後添盃喜得堂中班簇簇地盡是飽參耆宿念我法門同相贊化幸然之甚適纔出方丈時摸索得一句新鮮佛法欲將來供養大眾恰遇竹簾一墜半句都沒了搔首顧左右云還是如何不然問取露柱子去傍有一僧纔出師推住云堂中有人在僧擬對師一掌便歸方丈結制日傅文宇胡清之陳德生居士等設供請上堂師舉拂云造入蒼龍窟宅為探玄珠截歸香象行蹤貴除金鎖須明掣電之機始可深經爐韝若依說黃道白處轉得身時依然布袋裡老鴉有力之士將大千國土橫拈倒豎劈空擲得粉碎法我情忘了無纖毫過患方越安隱幢踐無憂界知與麼事何必九旬禁足活受羅籠勿則傾心將四大交付龍天把從前伎倆去盡奮大意氣徹底掀翻不負參學一生不空師友策勵等閒線斷一切齊休又溈山道有句無句如藤倚樹樹倒藤枯句歸何處蓋千古為衲僧徹骨底句後大慧於此脫卻貼肉汗衫若非圓悟舉幾錯一生看他先德不盡不住今人豈忍因循放過蕺山不惜唇皮更為一頌請按下雲頭定其銖兩有句無句石虎當途踞如藤倚樹嚼碎金剛杵樹倒藤枯肘後鐵輪孤句歸何處鞭起崑崙柱連卓柱杖云相隨來也好不堪立地是甚尿溺氣參頭問昔年弁嶽開爐今日天台續燄還是人傑還是地靈師云我不識彼進云子承父業家常事祖令孫行意若何師云須知萬代金輪子進禮云一曲無絲韻萬籟和聲齊師云未堪奉重吉先邢居士問百丈師翁於此開堂有云秦望山頭雲靄靄鑑湖波底月團團今請和尚斬新條令師云照顧腦門進云不惟紫霞峰頂笑傲煙霞直令蕺嶺堂中輝增佛日師云好事不如無進云如何是父子功齊一句師云古殿苔封後調羹知有人士作禮云莫道相逢不出手寒煙繡壁又添新師直視云高不成低不就上堂若論個事適纔被上首一槌擊碎了也致使山河鼓掌大地聞聲何假山僧口漉漉地以為極則事正與麼地請休去好若停囚長智轉見不堪總之旋嵐倒嶽不出功勛定國安邦猶存道合應知有異類中事始離滲漏拈拂畫相復作相云葺葺芳草外展足奮西河復振威一喝下座上堂杲日迥當陽森羅俱透徹法法目前機直下難存跡諸上座道無諂曲唯一真實外不放出內不放入冷地看來是甚屎撅有個關頭為伊點出若領會得參學事畢且道是那一關昨日三更時無孔鐵錘被蟭螟蟲蛀得七穿八穴無孔鐵錘奮怒撞入睹史天宮沖破了彌勒內院失卻布袋子且道在甚麼處還覓得也未豎拂云總在這裡復拍案云我嘗於此切空生問彌勒彌勒哭蒼天布袋笑不歇有甚奇有甚奇九九秪是八十一分付諸人不煩久立僧問白雲纔出岫彈指鳳鳳歸如何是臥龍風景師云山頭鼓白浪進云山門與佛殿未立時和尚那裡度生師云北斗裡橫身如何是戒珠的的意師云千年石吃萬年松如何是方丈的的意師云入室不登堂登堂不入室進云與麼則躍出一輪滿山河悉坦平師云也是平地喫跌馬豁如陳無礙二居士率眾設供請上堂乘風千里全憑電影攀鞍足下通玄須識目前無法飄空玉露橫施枯木生花寶閣珠簾直透冰壺水月塵塵爾剎剎爾展獅子之全威隱隱時密密時挾異類之獨步了知達道人不貴通玄路較之從門入者不是家珍奈何土壙人稀相逢者少山僧倒握肘後靈符安忍坐沉英傑昔我弁山師翁以一喝分五位發明洞上真宗蕺山繼茲祖室少為續貂以一拂列五位即拈拂擊案云正與麼時驀然一擊此正中偏也一擊之後正眼難窺此偏中正也正當一擊迥出無句中有句超越玄路此正中來也拂擊齊呈功全祖父此兼中至也拂擊俱消生佛不有此兼中到也諸昆仲全提祖令則且置還知越格超方事麼復一拂云無毛鐵鷂摶空去燄裡靈苗結子多應林闍黎問五位君臣即不問如何是賓中主師云簷前雨滴聲飄室如何是主中賓師云正令全提建化門如何是賓中賓師云六街人簇簇遙指玉門孤如何是主中主師云垂衣含妙旨密步踢雙明進云賓主已蒙師指示向上還有事也無師云天空海際低進云過在甚麼處師云到即不點進云大似紅爐飛片雪師云點即不到便踴身下座信解禪人同魯居士設供請上堂馬蹄殘跡鎖歸雪夜蘆花畫角聲孤吹出清霜玉露老船子拋鉤撒網末遇神龍任公子七牛作犗不逢蝦蟹須得與麼人堪承與麼事昔雲巖和尚示洞山老祖云价闍黎承當個事大須審細山因過水睹影徹見雲巖骨髓頓翻舊日所蘊以後建立家聲高提密印剪異見邪途破野狐窟宅千古之下相承者希如寶鏡三昧云重離六爻偏正回互莫是爻分體用卦配君臣麼若如是牛頭伏羲早為劃斷又何待祖師西來洞山舉唱若不如是爭奈親承寶鏡公驗宛然不見道錯然則吉不可犯忤當明中有暗非賓中主當暗中有明非主中賓明暗不相乖非妙協亦如前後步非通途亦不是啐啄之機亦不是劫前之旨蕺山一齊按下洞山面目何處立地諸仁當向此處分疏得下始越古人門閫縱奪自如勿則劍去久矣方乃刻舟卓柱杖云咸陽宮闕圖神鼎一定河山有沛公郎下座直指和尚同吉先邢居士請上堂師陞座直指和尚白椎畢師云靈木豁鴻濛霜花越樣紅夜深漁火燒焦桐冰稜結起響叮咚吹破巫山十二峰躍出猩猩耳又聾猩猩無語過橋東撞著前村王老翁老翁捫虱頗從容扶過斷橋流水中忽相應一交跌殺岑大蟲正欲相救忽有木上座無端惡發不容下手轟轟撞碎了太虛空直饒女媧氏煉石補天作用秪得袖手傍觀冷地走出布袋和尚高聲喝住云止止我有個布袋子為虛空塞卻向前一擲豈期袋角頭裂出個獨角水牯牛口似血盆牙如劍戟將大千國土靈苗異種嚼得淨盡無餘此時佛祖相聚攢眉蹙額無計可施山僧正在丈室齁齁熟睡卻值同枝法兄直指和尚過訪邀逼蕺山普救這著公案秪得持條斷貫索拈起絕魂符出來判斷一回乃顧左一喝云天不缺東南顧右一喝云地不陷西北復正身一喝云杲日麗天依然海晏河清任汝鬼面神頭總被吾兄一槌擊碎正好解交更添個惡辣吉先公獨步梅山首尾俱絕閒閒自適悶時打三盞何處得愁來囊褁不住把個曹山顛酒傾出普同供養諸仁者且道嘗是不嘗是嘗則被他喪身失命不嘗則辜負來機還決斷得麼如或未然蕺山不免官路當人情去也嘗者是靈衣不掛語無路打鼓調絃和未齊太平曲奏官街臥不嘗是嚴陵薄視王侯志前村沽得一天醉高臥漫誇金紫賜秪如竭盡今時何處與主賓相見卓拄杖云雙枝傑出萬峰冷夜半行人過雪山吉先居士問閉門自適獨步超方針芥相投未審承誰恩力師云問取露柱進云恁麼則兩袖雲煙翻翠嶺一聯奎璧煥獅樓師云少加贊歎爾銘問萬象之中獨露身唯人自肯乃方親未審蕺山堂中幾人點首師云從無此滯貨進云恁麼則衲子翻身獅兒回踽去也師云木毬子不放你在進云秪如台嶺往還事又作麼生師云桃源飛古岫白雪壓神鵝士作禮云祖孫弘法父子同風師云同曲不同調上堂連朝風雨不歇知寺眉毛廝結天龍不善調停缽盂連聲叫屈直得禾山不能打鼓雪峰無力拋毬唯有蕺山越格煙封戶絕游優也不要諸人在長連床睜眉