陞座學人問當年把斷關津象王隱跡今朝頓啟金鎖獅子嚬呻把斷放行即且置正當恁麼時一句請師舉唱師云入室不通耗覿面墮莖眉進云野老謳歌漁翁擲釣為復威音那畔之神通為復今事門頭之妙用師云不犯清波時汝試道看進云今日覷破和尚師便棒進云一句迥超千聖外萬靈何處謝無私師又打進一喝師連打云猶是階下漢士連喝歸位師云大似敗將拖矛僧問豁開戶牖寶月流輝逼塞虛空眾星拱北作麼生普蔭群生句師云有水皆含月無山不帶雲進云塵塵剎剎玉轉珠回個裏無私如何著眼師云君臣道合猶成昧賓主相逢尚失宗進云一句絕遮攔千機齊烜赫師云看取腳下學人問三年掩室摩竭令行適承和尚舉示玄關請通個關中消息師云到來無你下口處進云恁麼則但見花開落不知春去來師云不屬陰陽造化生作麼生道士便喝師云羞也不識進云秪如不合伴的人來關中主如何相見師云放汝三十棒進云和尚也須照顧眉毛師云未識觸諱在師乃云獨照雙泯過尾窗櫺猶墮格入廛垂手玄關直透尚迷津不若隨分納些些免至畫蛇添足是以入毘耶之室白醭口生行摩竭之風談玄無舌惟以坐看陰陽消長閒聽花放鳥鳴任性不羈陸沉自適然素志如斯但事無一向千日期圓聊伸款案特借山河大地為演無量妙義還見無情說法麼豎拂云新篁解籜節奏桑林之舞梅拖嫩綠渾忘鼎鼐之勳草木揮玄水雲共唱得游刃有餘地頓消斧鑿之痕以此報檀度之恩無恩不報酬佛祖之德無德不酬慶快千生法流萬古雖與麼道然未透者亦不得等閒放過錯卻勝因豈不聞裴休丞相云鬼神沉幽愁之苦鳥獸懷狘猶之悲修羅方嗔天人正樂可以整心慮證菩提唯人道能為耳人道不為吾末如之何也已矣諸菩薩箇箇頂天立地猛烈丈夫何得被八風五欲活埋萬劫千生改頭換面時何有今日果肯將智慧劍一刀斬斷生死魔軍五陰怨賊坐致太平寧不深幸哉秪如應節酬恩作麼生道卓拄杖云碧玉盤中烹石筍驪珠腹內產雲芝爛煮虛空千日醉佛祖無門覷得渠下座黎川菴主印源參常等設供請上堂師陞座僧問一花現瑞多子承恩一句周隆十方慶讚未審和尚如何通信師云持書不到家進云學人頂戴有分師云腳跟下放汝三十棒僧以手呈具云大眾看看龍門無宿客香海縱金鰲師打云猶遭點額痕進云明眼宗師天然有在師云切忌詐明頭師乃云以斯道覺斯民斷碑橫古路白月現黑月隱崑崙草裡眠南閻浮提打鼓西瞿耶尼聞聲東弗于逮扣機北越單那擊節非非想天逆擊一棒金剛際下撲地翻身其中百億須彌百億日月百億世界納向一毫孔中十方諸佛演大法義挑豁愚肓諸仁者秪如一毫孔又納向甚麼處咄切忌道著直饒密步移來腳跟下紅線未斷在南泉大師云三世諸佛不知有狸奴白牯卻知有此事直須解向異類中行始可紹隆玄化勿則盡是流俗閨閤中物開口便成過患非惟不能與人點病自土也消他不得彼此何益哉于中有知南泉行履處麼振綱居士撲地一旋而去師喝云這畜生猶是亂跳卓拄杖云盤空鐵磨旋頭角芳草叢叢吼石欄大眾不煩久立珍重師至石湖金僊老和尚請上堂師陞座拈香云此一瓣香有倫有序唯德唯尊奉為金僊堂上法叔老和尚惟冀法韻振三千祖風垂萬億斂衣就座師拈拂云萬頃湖光遠駕長空之玉練千枝翠色橫推數點之青螺高大門庭水雲異色格高調古綿密家風靜上座自遠趨風懷香叩室頃承玄化千載一時不意我老法叔寵渥太隆惡辣猶甚勿顧外揚家醜命陞此座若今獅子林中何敢揚眉播舌但蒙方命聊塞一時復舉拂召眾云此是我金僊老人一生受用不盡底句子特借靜上座手中拈出為諸公賞鑒由來錦上添花諒諸公久已得侍法要豈敢再下註腳但老人平日驗人道個把定咽喉唇吻除卻千態萬狀不得有語不得無語道將一句來此正驗今時之法弊救萬世之弘規若能向這裡擺脫得來覿面親見老人赤心片片今不肖續有一偈並為傍敲把住咽喉唇吻萬仞懸崖卓立果是獅子之兒當下便能返躑若在某分中拈有三句為供養老人顧左右云且道是那三句第一句五道不通耗何處立三玄第二句眉鋒掛利刃裂破率陀天第三句手持火把子潦倒夜明前聽其緇素得出猶是門庭邊事須知尊貴一路事別且道如何是尊貴的的旨若要深登堂奧共相參請金僊老和尚去即下座吳江文學量如吳居士為薦亡嗣文學不浮請師對靈小參枕斷邯鄲破吾生之有寄花飄棘苑沉來去以無涯擬將氣吐虹霓誰為水雲路隔師撫几云不浮公汝髫年學冠德預耆英堪羨孝悌恭身頗奈文福未並壽傾四六之中轉盻流光三祀空辜堂上椿萱忍割友恭愛弟杳隔幽沉痛情可愍世既如斯但能知死生不借何妨出沒自如到此說聖也不是說凡也不是生也不是死也不是此是公一貫之道吾一諦之理不聞先聖云諸行無常是生滅法莊周夢蝶渠不是我蝶夢莊周我不是渠為公拈出一線頓教全體如如復擊案云寂滅場中超性海毘盧界內迥無私戒珠結制茶話僧問十方同聚會個個學無為請問和尚今夕數千指圍繞如何得普令成佛去師云家家有路透長安進云如何得獨步龍門去師舉茶甌云淺斟滿酌不許濕口僧貯立師以杖擉退師乃云虛空含萬象大海任魚龍會得目前法何須探別宗諸公既負笈遠參十方雲集腳跟下事固是不缺分毫若不親履踐一回如人說食終不能飽英俊者肯將個事自己顢頇良馬見鞭影而行若待人鞭策得來決是個無血性的漢但參玄之士亦必須經一番鎚煉方脫得野狐氣味勿然盡為門頭戶底事學兩句口頭滑禪弄幾節峭利機鋒於自己分上大好沒意思非唯虛喪光陰空辜檀信在袈裟之下作地獄因更為可愍山僧不是說老婆禪但今時末運目不奈看惡習遍熾蕺山既據此位平日痛心之談盡情告報祈把所參所學的都拋向他方世界之外雄糾糾立起新鮮意氣提句無味語卓立面前直下如銀山鐵壁相似通身排闥不入無一絲毫走作撲盲坐斷自然和底脫落信不我欺若做模打樣來參五味禪萬劫千生亦無了日各當照顧住住歸堂時切莫撞翻板棰爐柱珍重師於天台送護國先和尚入塔回山示眾師豎拂云國師塔樣耽原未善圖描造塔疏山反惹羅山活葬揀點來俱不作家何似我先師嘯老人任將活計付兒孫那管湘南併潭北順時而化不假安排有偈無偈是甚尿氣雖則傑出諸方更添個蕺山不肖子未解奉重將阿爺活埋向千巖萬壑之中令教水雲絕聽眾兄弟又道不順非孝不奉非輔山僧既作洞下兒孫何乃不知忌諱眾中可知過患麼乃聳身云秋江清淺時白露和煙島良哉觀世音全身入荒草復頓足云貓元章居士為師慶誕請茶話混然至理非言說徹底須知絕意求若識趙州滋味辣何須影裡覓生繇舉如意云此是萬法之源千靈之母若人透得一機任汝橫吞豎嚼但要解吞應解吐若吞得吐不得未免被菱角如針刺卻口毛栗如彈塞卻喉果能裂出神龍之首則佛祖不能安汝名天魔不能窺汝蹟勿則浪沉往返杳喪光陰昔歐陽文忘公官洛中一日游嵩山卻去僕吏放意而往至山寺修竹滿軒霜清烏啼文忠休於殿陛旁有老僧閱經自若與語不甚顧答公異之問曰道人住山久如對曰甚久也又問誦何經對曰法華公曰古之高僧臨生死之際類皆談笑脫去何道致之耶對曰定慧力耳又問今乃寂寥無有何哉老僧笑曰古之人念念在定慧臨終安得亂今之人念念在散亂臨終安得定文忠大喜不知膝之屈地師云你看學道者不是徒然泛泛未能決其志終日在人我山中打迸是非場裡橫身他時如何抵敵蓋疑信相半因而隨情逐物臨窮方悔噬臍何及特此告報須知出母胎從少至老盡未來際未曾離卻這個光明果能一腳踏穿桶底何處有死生之所流轉但不是說了便休今且乘風快便莫令失卻時日蕺山恁地熱亂還識好惡否擊如意云不離當處常湛然覓即知君不可見解制知浴設茶請示眾露柱當天豁雙眼未為奇特蟭螟怒發吞大象理亦宜然果是伶俐衲僧便可一捺便倒若隨人緇素得來總是倚草附木漢過在紅線未斷撥著好似浪裏拋毬徒費草鞋錢堪作何用上智之士一聞釋然中下之流疑而愈滯蕺山與麼道自好慚惶煞人復舉昔有一官人入寺至禪堂寺主隨行官人問曰諸位在此作麼生對曰欲圖作佛官人笑云金屑雖貴落眼成翳主無語師乃云好笑寺主恁不唧溜被俗漢一問直得口如扁擔若遇蕺山但向他道在此換居士眼睛非唯令俗漢屏卻咽喉亦見此中凜然難犯諸仁者應知有佛處不得住無佛處急走過轉得快便不負蕺山和身一拶如或未然明年更有新條在惱亂春風卒未休修萬佛懺圓期上堂師陞座學人問古鏡未磨時光臨萬象磨後為甚麼不鑑師云我卻不識你進云恁麼則是處是彌勒無門無善財師云猶借玉階行進云如是則學人別道去也以手點空三下便作禮師云料掉沒交涉師乃云香花雲寶幢雲乾闥婆王美樂音出生無盡諸功德裂破三賢十地門雲從龍風從虎磁石吸針潮長醋情與無情共一真萬象森羅鏡裏布如是知如是住不見一法為伴侶智者能知罪性空坦然不怖于生死大眾且道喚甚麼作罪性喚甚麼作涅槃若向兩途冰泮得來則了即業障本來空如循罪福之階未超向上一著所云未了應須償宿債莫謂與麼便乃看作一切如幻之解總不落莽蕩之殃必將沉撥無因果力能脫體一回千佛萬佛列聖諸賢悉是空拳誑小兒所謂但以假名字引導于眾生如或分疏不下再為汝等下個註腳不見南泉大師因陸亙大夫問云弟子家中有片石或曾坐或曾臥欲鐫作佛得麼泉云得莫不得麼泉云不得師云據南泉老漢雖有先行之勢且無絕後之關直被個俗子將一片石全身壓倒直至如今無展舒處若喻指門下即不然待他問作佛得麼但云言不該典非君子之所談莫不得麼一喝云門臨千尺井過者必攢眉于斯撿點得下一期佛事以週如或未然跋涉不少卓拄杖云會麼雖然春色沒高下無奈花枝有短長即下座師至弁山祝元潔老和尚壽眾請上堂師云日麗中天揭破虛空流活眼風生八表撥開萬象始明宗事存函蓋合回途全祖父功勛理應箭鋒柱展手合君臣大用具斯三昧始得運斤成風絕無觸犯固知曹洞門庭承當不易作用光大渾似純金砂汞銀鉛一時銷盡不肖遠叩祖山恭遇法叔降跡之期為祝華封渴瞻嘉瑞不意恩寵太過特命兩序諸兄邀登此座若論禪道佛法未入門來早已填溝塞壑了也況兼祖庭之上獅王騰踏龍象縱橫又何敢布鼓雷門自遭話墮若論慶讚一事欲以大千界而為壽吾叔早已坐斷十方欲以須彌盧而為壽早已碎如微塵欲以四大海而為壽早已一口吸盡欲以玄玅義而為壽又不許立一元字腳在第一義諦不容展舒于倫序分中安可簡略是以還有個商量處官不容針蹔通車馬乃豎拂云我知虛空不可量壽命不可量世界不可量壽命不可量眾生不可量壽命不可量佛法不可量壽命不可量還有個最親切最要緊不可量中一事諸公能知消息麼如或未知今日勿敢越俎作速參取老人去何故聻待得叔孫成禮樂始知不共汝同盤書記問閫外將軍多汗馬就祖還家事若何師云不宰功勳進云人居大國方為貴水到源頭始見清師云明眼自知進云如何是慶誕一句師云人天仰企四海雲奔進云香稻啄餘鸚鵡粒碧梧棲老鳳凰枝師云猶未是公著腳處進云在和尚分中又作麼生師云不借借記作禮歸位師下座嘉禾李又恂居士為亡室盛氏請師對靈菱花鏡破俄沉合浦神珠閨閤香消頓失鸞凰良配柳生於肘不知造物暗中移蝶夢為周未識我渠猶問影智者觀斯聚散等浮雲去來如傳舍愚人自昧情關固結汩沒愛河將此大光明藏翻為腐草螢星豈不痛哉驀豎拳高聲召云盛氏善人汝會麼握則成拳開則成掌一事兩名一身兩用又如一人左手拈香心知必生善果右手持戟回看定起殺機亦一心兩業明暗兩分到這裏打箇返觀未拈香執戟時善惡二境何處生已拈香執戟後善惡二緣何處受既無作者亦無受者此即是如來秘密藏金剛心不妨以螢星腐草復作大光明藏始知本來成現凡情聖見所作俱息以如意畫此相云當途截斷荊棘林鐵壁銀山俱踢倒下座雲門顯聖寺結制示眾知藏問一派曹溪水萬古遶雲門且道曹溪與耶溪是同是別師云細柳營中非正令神堯何必論功高進云滴水作江河還是師的用處麼師云若知帝力不見堯天藏禮拜云恁麼則雲門峰頂滔天浪海底揚塵見作家師云久知闍黎有此機要迺云奇特甚奇特露柱生兩翼飛過須彌峰穿卻諸人鼻夜半迥紅輪天明布黑月正眼不能窺萬機俱泯絕天上無彌勒地下無彌勒仔細拈來看是甚乾屎橛咄咄咄若向口角覓雌黃錯過三生六十劫是以參學之士最初行腳要決擇法眼貴有師承一入爐韝從頂至足去皮去毛敲骨敲髓撲得一點氣息也無轉過身來向無人處深蓄厚養為人拈一機一境腳尖頭也踢出箇佛來近今諸方為人亦拈出一機一境相對學人如紙裹麻纏相似遇箇透網金鱗又無捉摸處大似葉公畫龍一見真龍退身無地嗟乎蓋為不經真師煆煉自救且不暇何能徹底為人故喻指目不奈看收綸罷釣數十年來釋口不談箇事唯我雲門法叔同心同眼獎古勵今真人不世今繼住祖山命為傍分正化屈曲隨宜眾兄弟若識些子定動則不辜一期方便秪如古人道天上無彌勒地下無彌勒未審誰與安名為甚洞山遇此一問直得火爐震動爾等還知答處否現前有問著喻指便與驀口一摑云分明記取復拈拄杖云看看勿則葛坡久已化龍去徒使蹤尋費長房不煩久立珍重師誕日兩序請陞座參頭問仁主好生貞臣執法賢聖繼世法律無私昔日世尊初生即今與和尚還有同異否師云夏寒冬熱進云後遇雲門一棒又如何師云總是賊過後張弓參作禮云恁麼則寶樹風鳴無量壽金繩霞映妙高峰師云不煩伸贊僧問雲門風月萬古如新當斯誕日如何應現師云爐峰向後耶水居東進云誕日已蒙親指示半千衲子貴何從師豎拂云穿過那邊看進云親得全提後皆成獅子兒師云恐汝不是同流僧作禮云恁麼則寶鏡堂中提正令雙懸日月照乾坤師云腦後識取迺云冰河發燄相看猶是涉廉纖石筍抽條拈出早知成話墮輪扁得手要在忘功承蜩意鉤貴乎不犯當暗中有明佛殿卻跨山門當明中有暗山門騎佛殿得此機用在天而天在人而人一毫頭上現寶王剎一微塵內轉大法輪如是君親恩師長恩眾生恩一時報畢故居學地須知先聖垂慈一機一境一語一脈必要裂破汝面門乾盡汝識浪如黃龍禪師每以三句驗人一云我手何似佛手二云我腳何似驢腳三云人人有箇生緣上座生緣在甚麼處生平罕有契其機者目之黃龍三關古今拈頌者更多錯解者不少今日承此恩力特將此三句頌出為諸人應箇時節我手何似佛手圖窮忽現匕首祖龍一見魂驚易水光衝牛斗我腳何似驢腳虎兕忽遭出柙黔驢吞卻大蟲潘閬幾乎笑煞人人有箇生緣寒窗鐵硯磨穿直待名登金榜露柱卻好同年若人揀點得出三千七百齊捐捐後又如何展兩手云㘞即下座為秀水凝蘭盛居士對靈持櫆未達榮枯眼旅館空遺在日思露宿草菴門外冷霜天夜月隱歸期凝蘭盛公生平風流慷慨之懷末後得撒手便行之快秖空不是玉是玉也大奇在含靈不減分毫在諸佛難增點畫如是知如是住貴在回機天上耶人間耶不妨獨步業歟福歟聖歟凡歟卓拄杖一喝云分明記取解制陞座僧問衝開碧浪即不問放出神鼇事若何師云腳下波生進云覓火和煙得為甚玅高峰七日不相見師云到即不點僧作禮云今日親見和尚師云要你知休迺云揭起虛空蓋一層收來放去任縱橫草鞋似虎威獰甚拄杖如龍活潑生踏倒玄關須轉步驀行鳥道貴抽身諸方若遇談玄者切莫遭他鬼眼睛眾兄弟一期既畢銀山鐵壁撞得破否猛虎金鈴汝解得否驪龍玄珠汝摘得否若得相應不妨東去西去盡大地總是汝毘盧真境稍涉廉纖正好按下雲頭向冷湫湫地去思箇思不得的覓箇覓不得的思不得的作麼思鐵網拋空神龍透海覓不得的作麼覓夜半篩鑼賊身忽露恁麼舉揚還解交得麼遂擊拂云能知減灶添兵處終不和身困馬陵下座
