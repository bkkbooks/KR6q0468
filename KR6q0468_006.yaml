body:
  text: 學人金之銘大持姚上士與父同較侍者超級德卓記録續答三峰藏和尚啓雲門湛老人曹洞十六問并著頌敘緣起附三峰頌語歲在丙子暮春某次參天童悟老人時依山中結夏值同參友蜀之瞿公笈中撿得三峰藏和尚法録內有啓我雲門澄祖翁曹洞十六問展讀無何殊覺可異詢諸同學絶無定見久之撫膺嘆曰吾固知三峰懷先後隱疑扣末代宗閫欲睹去聖遺風事非驟然而舉雖言中不無有響而直下亦難剖其所發是以默於衷心擬私其答若驚巨海之無涯猶苦渝言于逆指退而思之未敢措于一辭後去天童歷遊雲門東山雙徑石梁經幾寒暑遍扣諸方惟護國蘊和尚僻處窮巖聞其大得洞上奧旨因而走參所未盡者一朝入室水乳相投頓絶向往之疑敢不深心仰止于是并偕皋亭具宗謨兄其續其法時壬午仲春也行腳歸來繼先十有八載每欲揭明是問然恐僭越當代至犯吾宗尊執以某強作前茅故隱隱胸次逮今四方導師前後出世法録遇必珍讀未有齒其玄論得釋所向近因退止松陵杜門臥疾偶二三子參請之暇論及是事欲請垂一言以決疑似豫聞之頓然而起曰此誠素志也較雲門博山交光互彩垂答已周固不當更墮駢拇之誚因讀三峰復自敘其扣問始末并著頌內侮慢不經祗得隨彼發縱貫矢射隱首撿峰敘云啓雲門澄和尚門答云姑置以俟來看啓博山來公亦曰姑俟面面陳耳峰乃謂顧盻諸方無可激揚此事者想亦不易答耳由是慨然自為著頌云云兼是敘也三峰一何黯忽聾聵平生錯過雷音電舌之機深昧雲駛月運之際舉步迷蹤顧盼何預如雲門之姑置以俟來看峰速當向南頂謝而猶未領其旨復馳求於博山山亦云姑俟面面陳耳二老誠謂妙唱非千舌峰堅持以為不易答者斯則辜負良多豈不聞馬祖因僧問離四句絶百非請師直指西來意祖曰今日無心情汝去問智藏藏以手摩頭云今日頭疼汝去問海兄海云我到這裏卻不會僧乃舉似馬祖祖云藏頭白海頭黑如上一案全提正令今古盛稱于二尊宿所示相去幾何峰亦可置馬祖一門於不易答否在三峰分中料不甘矣故法之所在隱顯全該橫坐斷於朕兆未形之始行之所至生滅掠盡直消融於逆順真俗之微得入是室者必光大其心嚴正其旨甚欲向東塗西抹處討箇分曉未免迷繪失真亡羊泣岐轉行轉遠愈指愈昏果是絶流香象幾肯作忍俊韓盧的明第一義天決不待縱橫文彩峰今絶不虛己自照以謂無有激揚此事詹詹角立參商乃至倒疊危機高豎我見且句中逞不遜之勇貶削紛然妄以信陵竊符私奔魏曹篡漢等語立陷洞山先傳後悟將吾宗祖世承法系忍心塗污譏刺橫流於無巴鼻處捏個巴鼻而欲為人眼目為人導師寧不為愧恐千百世之下頭正尾正者未必有然其説耳故列彼著頌布告大方明辨以決其非不作儱侗異議庶明三峰心迹於九原也矣三峰和尚問云雲嵒傳寶鏡三昧三種滲漏與洞山者還是過水睹影前事是睹影後事若是睹影後事為何不見重參若是睹影前事為甚未悟而先傳堂奧峰著云目前未必機銖兩睡中先付定盤星又云子細不得一向頌曰崚崚石室暫相逢良久淆訛囑付重眼誤自開當細見世間幾個是真龍師著云琉璃古殿照明月忍俊韓盧空上階又云大覺非同睡裏光頌曰綿密家風豈易逢始終絶越句非重不知尾後吞蹄角那得神針點活龍師答云三峰首陳斯問雖影射後先疑似之有間於始末悟脫了義之未詳是以桂史傳訛幾嫌受命杯蛇誤影暗毒旋生立慨當途之士嫌昔於幾希矣且雲嵒示寶鏡三昧三種滲漏與洞山者乃烹煉佛祖之法藥為剪除異見之神鋒洞山苟不因其道焉能脫悟後之餘知雲嵒若不辨其苗奚以別克家之真子所謂是法非思量分別之所能解唯佛與佛乃能究盡豈同庸流淺識妄指太虛而欲齊管見不亦霄壤乎故未窺豹變難測雷機不跨禹門終遭點額是道也挑剔升堂悟迹掃盡知有餘波非初機藥石豈驛卒銅符固知曹洞家風成褫不易未有舉足不更上層樓而能目窮千里也若法果可傳習事必類于講肆噫將誰欺欺人乎欺己乎古今知識睹參玄之客腳才跨戶望影便知故風穴識仰山之再來浮山知大陽之有繼安有親承槌拂肇起宗風之祖妄駁其先傳後悟之法式乎較洞山始謁南泉值馬祖諱晨修齋次泉垂問衆曰來日設馬師齋未審馬師還來否衆皆無對山乃出對云待有伴即來泉聞已讚曰此子雖後生甚堪雕琢山曰和尚莫壓良為賤泉於時心先識之之矣所謂虎生三日便有食牛之氣次參溈山機緣未契辭行啓溈山云還有與師同時慕道者否溈云此去石室相連有雲嵒道人若能撥草瞻風必為子之所重遂至雲嵒于無情説法處了達其本至辭雲嵒猶沉悟迹故臨行尚有末後之重拈審細承當之再礦值因過水始釋前疑乃述所偈以明始末俱盡若大慧去天寧於虎丘而冰泮往迹也後乃展其玄化法震海宇指真説法直舉當陽語示曹山尊承世系非以先傳寶鏡後悟心宗而可昧其昔之所得不令其後之示續也若云更令重參不識所須何事若云先傳後悟不知始悟何宗以此正大機語謂之先傳後悟者大慧不應于天寧先受圓悟所付分座驗人後復至虎丘打脫舊蘊矣不見其録中云閲華嚴至菩薩登第七地證無生法忍洞曉向日請益湛堂殃崛持鉢救産因緣驀地打失布袋當斯時也礙膺之物撲然而散與洞山涉疑過水頓脫悟後之影異曲同調亦可謂之先傳後悟得麼此若以洞山之悟與大慧不同大慧供招現在若大慧與洞山悟迹不別何爾獨具此疑是以失探其源沿流不止一言欲決脫盡乃師洞山於先既得其本矣豈不識睡中之主乎峰今何更著為目前未必機銖兩睡中先付定盤星將欲指勺水而評滄海一何狹劣之甚今以識睡中主為極則殊不知徹底後更有事在看其頌首句以崚崚石室暫相逢當頭便存譏訕因溈山指洞山石室往參一見雲嵒即時契悟遂辭去云云今以謂石室暫相逢則永嘉謁曹溪夾山扣船子豈不暫之更暫耶秪恐相逢不相識迢然舉處貴知休又云良久淆訛囑付重峰絶不究洞山因雲嵒所答秪這是山便呈出個等現的見處于良久之地嵒復驗其不盡功勛故更與一截山時尚未敢和身放倒向後直窮至古人到不到地偶於過水脫盡重開不墮區宇立證無心之良久還更淆訛個甚麼不傳之旨又重囑付個甚麼不見佛果頌曰水中影子因身有若實無身影亦無百尺竿頭才進步一毫端上現毗盧前以指洞山孤滯于良久之無心後指出頓現無心之良久明其先知有因而不知有後不知有因而知有凡情聖見共相回互豈如峰之頌茫茫忽忽認影迷頭嗟哉休將間學解埋沒祖師心又謂眼誤自開當細見洞山前之所證後之所盡何處誤卻正眼而云當細見耶結云世間幾個是真龍若至人一徹其始如乾元之體不住其功而能用九故曰用九見群龍無首所作與時偕行莫測其際名不得狀不得又擬向何處見龍德耶既統承佛祖大任必能超天地化萬物興雲吐霧擊碎虛空反疑乎是真龍非真龍而不為之一辨決耶且發言害理以外其義故云詖辭知其所蔽邪辭知其所離將欲百世莫之能違而合行其説者不亦謬之更謬耶試看先德內不欺己外不欺人絲毫未盡必力為之非同末世之言過其行以聖自居詆毀前哲甚欲突如來如必至其行次且豫誠知大言不辨恐更起于疑人之疑以不釋其所疑也是以并大慧一節首而出之峰問若是堂奧果可先傳又説甚麼自悟峰著云若不水中見幾乎苦一生頌曰不因度水絶來蘇定落然香受祖圖師法既傳成紙墨奮龍行雨在驪珠師著云休看楚璧作碔砆又云寶鏡不從言路得劈開心眼是真師頌曰眼裏聞聲困早蘇謾思索馬按韓圖相承一滴非言説濁智終難辨髻珠師答云此問首答悉以備之事必準明其迹不宜再為聲指惜三峰未始本其所出力欲捲空捲地迷障人眼故其頌云不因度水絶來蘇定落然香受祖圖之句始隨蹤于大慧行腳中述其所參洞下尊宿有臂香授受不妄付人之語而為實據然大慧初年行腳見地浮沉雖稍有解會於己分中毫沒交涉應不敢妄自承當時猶周遮途路之悲未能窮理盡性宜其不勝任也歷觀洞宗從始相承祖印傳燈備載未有見其如是之授受未有聞其如是之法式三峰總不辨大慧最初之見反至承虛接響潛興鬥巧不復循理蕩激風波於言下欲喪至人之實吾自知其力不堪矣於人使可易以詐在天使難架以偽將不危且惑乎未睹門庭施設之權變寧知堂奧鎔盡之規模且時之與人興衰不一各宗主化未得繩繩芳躅以繼其道湮沒時往往遇之鼎盛時得有幾幾或斯道寂寥師家得一敏捷者未必不獎勵以進用意琢磨所謂以天下與人易為天下得人難且爐鞴之下多鈍鐵良醫之門足病人但未見先有所付而後令彼自悟也大慧己之不頓脫者是誰之過歟今何得執一時之偶議廢蓋代之家聲相為攻擊至暴肆求疵以欺掩先聖之實證乎如洞山囑示曹山寶鏡三昧云末法時代人多乾慧恐屬流布喪滅吾宗指原始要終之大節還可陷雲嵒先傳堂奧得麼既不可陷三峰一生之眼見耳聞沒向何處去也欲將寸澤之鯢而鄙鯤於大舉多見其不知量矣洞山之悟于初非三昧耶後脫於見非寶鏡耶古云但得本何愁末洞山之先悟豈非本耶後示曹山豈非末耶三峰自謂濟上傑人何至反生迷暗請天下後世明達者公驗其邪説之非欺滅之狀可行乎不可行乎為臧耶為否耶夫歷代宗匠徹悟不假于人紹隆自當承旨展化必以師資為血脈貫其所統昭示來機豈有內繼皇嗣外膺大寶反泥乎父作子述之丕承而臣下不為之折節國法不為之遵行耶若今之玄要必待臨濟再出面囑其旨而後敢行不亦迂闊之甚況雲嵒父也洞山子也葉奕親承其道反欲枉加疑似吾恐斯問大有失于所學固不宜向此處為跌宕為層巒為左右舌為螳螂臂雖蜃樓海市見日便消簧鼓虛聲罪將奚釋大言著為若不水中見幾乎苦一生試問三峰此處是見耶脫耶入耶出耶依住耶滅盡耶向這裏不覓個洞山消息真乃苦卻千生萬劫斯謂羅紋結角交加處鶻眼龍睛失卻真又云師法既傳成紙墨奮龍行雨在驪珠古德云祖師心印狀似鐵牛之機去即印住住即印破正與麼時豈三峰死被知見之所印住而不一為之破乎如五家門庭各具大機大用相繼其道者豈皆習紙墨之傳乎豈洞山未明本分而行雲嵒之道假此驪珠乎恐近代異流搜奇變怪掩戶傳宗以己方人者或有此耳殊不知法乃人之用珠乃龍之用豈有昧己之正受三昧而反死抱前人之筌蹄乎但恐人非真人龍非真龍也將欲布鼓雷門誠恐自先碎首彼此既為佛祖兒孫當為任重不應輕佻至是所言公斯非公言也所言私悟非私法也吾是以不可得而知其所發矣堂奧中事切莫掠虛若悟其源自當神會峰問若是法屬間家具而可以先傳可以後傳者又何必重於師承法乳峰著云幸存一滴活嬰孩頌曰分符貴在合符同苟不憑符何適從只恐竊符私奔者定然三尺不相容師著云代王禪位不須憑頌曰真王不與假王同躡足封齊何所從待得漢文西向後公私言路豈能容師答云按此一問峰擬欲曖昧其源傳亂天下使後世疑之快其私意遽然自得獨尊一家之統悲哉三峰何苦亟亟蓄心乃爾不知心要目為何物耶顧從上先德師資法印如火傳薪蓋知洞山參請徹旨所繼慧命非荒唐遙指影射虛承料不同晉代劉淵妄依漢統據何所見直譏洞山以法屬為間家具而不重于師承法乳耶倒引魏信陵竊符私奔力將誤入人罪以相欺蔽耶且洞山之創始也德配靈峰功超少室作用嚴正宛似純金萬世之下誰不尊之仰之戴之佩之今欲疊亂其師承之分所貫之道三峰何所見而敢暗行貶剝至是耶犯何條款頌為三尺不相容耶無根害理過難屈指考景德傳燈録洞山悟無情説法遂述偈云也大奇也大奇無情説法不思議若將耳聽終難會眼裏聞聲方始知余讀至此遽云則早存一滴活嬰孩矣山後辭雲嵒嵒曰什麼處去山曰雖離和尚未卜所止曰莫湖南去山曰無曰莫歸鄉去山曰無曰早晚卻來山曰待和尚有住處即來曰自此一去難得相見山曰難得不相見山又問曰和尚百年後忽有人問還邈得師真不如何秪對嵒曰但向伊道秪這個是山良久嵒云承當個事大須審細山猶涉疑後因過水睹影大悟前旨因有偈云云又五燈指月等録載雲嵒良久曰秪這是山沉吟又有載山作禮者紛紛不一較傳燈載山良久處正呈所見之謂言下投機處也如按別録則問答全不一氣據洞山之良久乃其始悟時大題大目未可輕易惜乎今古尊宿等間看過毫不著重審訂其實任聽截長續短以恣邪説且如雲嵒因山一問便爾當場分付山雖欲力任但不能直下無垠是以嵒之再舉至山之再礦消法執之微芒斷末後之根蒂今作雲嵒良久雖於示處可用然在知有相參絶無意味故以傳燈為實據斷不可擬定雲嵒之良久而非洞山也況嵒又未見山一語何以便言承當個事大須審細山前又沉吟後又涉疑若果如是則昔日所得處面目何在故山之良久不當改作沉吟每思後人所載鳥焉之誤其過不淺淺也且景德傳燈系大宋道原禪師編次賜入龍藏師系法眼下二世孫當真宗時道欽四海明賢與之核實驀修筆定頒賜流行敢以洞宗之始祖機緣而不為之一詳細乎但年世積遠學者寡識不能推詳本真翻然異論事不師古擅為批削余是以遵上古而明之山嶽可使之移江海可使之竭唯斯正眼斷不可更也今三峰總不較前人舊案錯疑後有波瀾妄議雲嵒良久淆訛囑付重以法屬為間家具之非試問洞山辭雲嵒時非比香嚴之去溈山而先未有所悟者但猶沉悟影纖疑隱隱直窮至不坐最初句不墮末後句體盡無依香飄果熟然後出世拈香豈非光明正大赫奕之師承法乳乎蓋昔亦有不重師承法乳之恩者如開聖覺初參長蘆無所得次依五祖演發明後見長蘆法席鼎盛遂往嗣之拈香時不原所得忽胸前如搗發癰成疽竟以疾卒此非欺滅師承萬代之龜鑑乎如是法印還敢作間家具耶不耶但近代師承與古大異昔之參請者若於一言半句中稍有得力處未敢自忽人天衆前必為酬報今之相承法乳者或背或向或與或取或好高自大埋沒所參或未經囑付妄為繼統彼此捏虛終身杜撰惟觀門庭熱鬧生滅為心倒換新奇朝秦暮楚不知師承法乳可如是之重耶輕耶吾固曰三峰當痛惜子今時不應錯疑于先哲也末代惡風甚熾習沿大壞恬不知怪寄深主盟斯道者若單絲繫于九鼎更混亂於無可繫之日寧不一為寒心毛豎乎懇力為荷之慎之毋欺毋忽峰問若人人可以傳得為甚繩床腳下聽去便道倒屙無及峰著云魏禪應知愧舜韶頌曰春秋一字但誅心詭御從他傲得禽握法不嚴成自負室中千古貴惟欽師著云佛祖典型賴有此耳勿則野狐涎直流今日審如是言震懼震懼頌曰神鋒凜烈斬機心未許談禪劇七禽雜毒信知難入耳雙雙嫩桂固宜欽師答云誠哉是言切於學人偷心未死之大害急於道者明真辨偽之大防若非真正種草久之悉作假雞聲韻矣無實證者觸處鐵山當面敢不自為覺察乎寥寥末季頽綱歷歷誰為聲援正所謂繩床腳下聽去招感禍殃不淺況云可以先傳可以後悟耶如古斫輪之小技者父尚不得而傳諸子況大道乎果得之於心必應之於手則我王庫內無如是刀峰何至積疑不已而更矇瞍豈能善之為視乎善之為作乎徒使言高而目遠迹廣而心雄既亂空華之障復傾衆響之沉無奈洞山眼裏聞聲不須耳授峰必禁錮其説何異柳生于肘而盲然不知物化誠如峰論當令雲嵒向常寂光中再將起之囑之或能銷鎔其倒見乎惜哉不識洞山之始應昧其終故死執定睹影前之未悟睹影後之方知滅其神化之忘功誑侮孤輪之獨照欲盈所志須將洞山過水前之實證實據者欺沒得盡庶幾得行其詐勿則皎然事迹恐愈掩而愈明徒將魑魅之蹤妄搏獅王之步將欲戕古以自勝豈其然乎試問唯欽之道掣電之機未審可使深相傳習而為悟耶五家之宗立法之始未能入其室者可令統行于萬世耶若謂遞代綱宗師師可據何至洞山直證雲嵒之道親荷雲嵒之法骨尚未冷反不容於統承大旨深毀其先傳堂奧耶繩床下聽耶并著以魏曹篡漢不及舜之受禪汙篡逆之訛言亂傳燈之疑始峰之所謂正乃一字誅心自狀其過速當痛為切戒毋至欺陷百端頌中又以王良詭御獲禽而比托大似醉夫説夢亂指西東將沒洞山為嬖奚之儔歟閲此不覺可怪可疑可悲可笑夫尊古敬賢其德乃大峰反聾昧於見聞頑嚚於心口棄德崇偽昧公泄私千古之下未見有登祖席者橫肆舌劍唇鎗作此惡聲全無忌憚法門豎異害莫大焉請觀濟上之青天霹靂旱地波濤洞下之觸背俱非如大火聚一扣其法似忤逆聞雷若由基神箭滅盡學人偷心搜盡野狐窟宅寶鏡高懸藏竄無地敢云握法不嚴成自負耶豈有斯道同世俗之幻術沿習於祕授耶欲假鉤繩而釣古待膠漆而固今於其正也反為削之斯峰未返天倪之上故傾積毀之風徒以自高而身殉者不亦莽蕩乎每思楊墨之見雖謂偏執然亦不言可傳之實法豈先聖以心印心之道反相搏擊使混常流耶峰既於濟上久專大任不當存心生滅之場啍啍欺世罪將何辭故曰欲得不招無間業莫謗如來正法輪仰祈明眼作家畏慎惕勵直示後學庶使法道綿綿弘揚萬億以垂不朽幸甚峰問五位君臣既是闡揚不少為甚又説個五位王子畢竟是兩義耶是一義耶若是一義石霜九峰料不多事若道兩義請判意旨如何峰著云寒泉品後煮茶香頌曰既分貴賤辨疏親密闡玄宗不厭頻面面好山披洞府脫然蛻去邈仙真師著云升壇推轂原非細大賞難論蓋主功頌曰傍分正化絶疏親借位明功挾路頻不賞元勳知奉重砉然妙指響天真師答云提綱挈領固非言象所明透網離巢拈弄何妨活潑必欲傍搜注腳恐教玷辱先宗緇素若不分明必至囫圇吞咽一義兩義不別根株王子正偏大有同異寄語參玄上士應知格外玄機正中偏宸宮開曉唱偏中正鳴珮仰堯天正中來石女下粧臺兼中至剖符知定鼎兼中到臣主豈能明透此一位以徹主中之主以別誕生之父雖曲盡其法無以少加但皇王根本勳位之不同主主依正攝盡之難別故石霜慮倣佛於金枝九峰懼尊崇於久御直使功勛不借隱顯大開如吾宗要訣云古鏡臺前子轉身而就父兒孫得力貴乎室內不知夜明簾外臣退位以朝君不令而行妙在借功明位王子五位者誕生內生本出之無殊在朝末化生之有異如位尊九五宇宙一人貴無倫匹天王之下降一級者有內紹有外紹本不同其位故各司其化內紹者位立儲君根本同出雖天然尊貴但欽承帝父秪奉一人謂之主中主外視臣僚巍然獨立隨處稱尊即根本智也雖分兩位實是一君根本不清豈知轉位必活遭其錯亂那明悟後再參以得大機以顯大用故曰內紹誕生之設有是來矣外紹者公侯伯子男以功勳而至雖不同內紹亦秪奉一人各秉其權輔贊化育謂之萬行等莊嚴亦不犯功勳必須一念回機始得全身奉重如閫外威權惟聽將軍令不聞天子詔在外各嚴其職在內共戴其君若矜不賞之勳肆跋扈之亂一經悖逆非惟自失本真亦且不能他受用也謂之理事俱背如華嚴六義有成相壞相別相同相總相異相異中原有同同中原有異所云是法住法位世間相常住脫斷常邊邪二見絶能所去住之關故不可以有心知不可以無心會揀明六相和合作舍各不觸犯極則處正眼難窺垂手時大千任運君臣賓主內外互融海闊淵深古今無間豈可參差上下混配其宗了知出沒洪波上須假弄潮人如著云寒泉品後煮茶香諦當甚諦當若知一味百味具足似乳中酪酪中酥酥中醍醐若離乳體則無以成雖等則有別於體本同無奈鬥搆輩每纍瓦結繩遊心竄句絶不知全鼎大臠之味終身役役曾未染指計為自得者誠謂得人之得而不自得其得者也或於法要中假令渾成相似緇素又不甄別大似盲人摸象誠如峰云脫然蛻去邈仙真矣抱鉛爐作丹鼎甚是可憐生欲得不乖大旨登其絶頂請再究始終之大向奉之深於修證原有階梯在運斤絶無朕迹方曰裏頭人不擔屋裏事學者知此則思過半矣其外者折衝萬里裂土分茅但久駐封疆則不忘於帝力猶妨野老之歡故曰修證即不無染污即不得弘法之源蓋本於茲恐不盡其所問更布葛藤一上稍明大略欲透法身向上關捩無越此耳還委悉麼雲中木馬嘶聲切焰裏靈苗結子多參玄之士切莫草次放過不負良工苦心勉之勉之峰問五位君臣曹山言正位即空界本來無物偏位即色界有萬象形正中偏者背理就事偏中正者捨事入理兼帶者冥應萬緣不墮諸有非染非淨非正非偏故曰虛玄大道無著真宗從上先德推此一位最妙最玄問空界色界説理説事既是曹山語為甚大慧道説理説事教有明文教外單傳直指之道果如是否若果如是討甚好曹山耶且道曹山意旨如何峰著拍案一下云是偏耶正耶是空界耶色界耶是理耶是事耶會得者冥應萬緣不墮諸有非染非淨非正非偏惟此一位不會者一任分君臣辨五位錯認兼中到為兼帶可惜許也頌曰東來西去共浮沉輥出囫圇格外音若向末稍烏炭認又成單板費沉吟師著云當堂不正坐那赴兩頭機頌曰橫穿向背絶浮沉啐啄之機異鷇音尊貴位中知不住豈珍枯木有龍吟師答云先德激揚個事展化多方或建立或掃蕩或隨立隨掃隨與隨奪總要當人脫卻貼肉汗衫非教人守株待兔隱顯言中為標的也故曰法無定止去病為良解撥金針瞳神立轉乃至明耶暗耶色耶空耶拈來悉作倚天長劍直使石女血流毛卓豎虛空骨碎眼迷光若必泥其言路則背水之陳必敗曳柴之勢宜亡要在殺活臨機用非死執是以曹山之建立出無中之有大慧之掃蕩去有中之無透過者關鎖齊開迷沉者町畦自劃又何必凝滯師家言路探指顧蹤繇者哉且五宗法要瞿曇老漢早已露布于三千年之前幸有後代兒孫作略宏遠傑出前人能超佛祖之見故具佛祖之用如涅槃𠁼字三法不共嬰兒之行五相鉤連滿字半字同別總異雖熾然應萬而無有窮於五葉一花豈分根派綿密也箭鋒也顧鑑也六義也暗機也高撾毒鼓截斷來去羈縻縱奪自如推倒死生墻壁幸有三峰力專斯道探出秦宮之照膽究明刮翳之金鎞直衝雪月蘆花外自可披衣向後看如頌云東來西去共浮沉果能化堅礙之疑絶遷轉之患則雲來雲去出沒無心十方剎海一毫頭現豈逐浮沉定見耽取舍於其間哉次云輥出囫圇格外音斯謂一句合頭語萬劫繫驢橛將欲搜玄抉祕徒增影響之知反落塵毛之劣秪如道聚不成團捏不成碎擬向何處輥出囫圇耶結中云若向末稍烏炭認又成單板費沉吟透得至微之奧於大功不住逢御飯不餐破微笑之風肆拏雲之手撥著如獅子音吼遍吼如法樂音等遍吼何至反費沉吟耶所云若將耳聽終難會眼裏聞聲方始知試看洞山頌云兼中到不落有無誰敢和人人盡欲出常流折合終歸炭裏坐峰將此頌錯擬其意言總能透得五位亦不過在黑漆漆地履踐認定洞山之末稍竟墮死水全不為貴呵呵不亦淺見浮沉將比量而作現量較洞山首句云不落有無謂格高調古和者誠難學人不識玄旨相將競出常流但不知一有所異便成滲漏何得云到是以密移一步竭妙化以無方垂手交參齊古今於一念直透二邊生佛不名之要道通結回互兼到終始之提綱所謂混然無內外和融上下平故名臣主相忘於古殿豈云認定烏炭費推敲耶如洞山問龍山云和尚見個甚麼道理便住此山龍云我見兩個泥牛鬥入海直至如今無消息看看請開頂門之正眼始堪空裏弄空華速透悟後之覺場稍許夢中來説夢則不誤指脫影為見影絶處為坐認非以三玄而不同五位死定在棒頭上方絶人氣也非以教有明文而曹山説理説事不同祖意也但願空諸所有慎勿實諸所無如是不妨有理有事有主有賓有玄有要有正有偏立證無身有事之大用不貴勳勞所至之藩封頓伏千妖百怪掠盡十地三賢消多知多解之壅塞禪點無作無功之正命食得弘其化豈不偉歟遞後之操進者毋使不明綱宗左右失顧識些子利害再令冰河發焰鐘鼓重新是知此問不弱峰問既單取五位為從上所推則今之悟者全在裏許安身立命為甚出語多是正中偏偏中正峰著云直須恁麼會始得頌曰從來雙足走西東起坐分明不住功脫履上床沉睡後一輪圓月挂高穹師著云星河垂玉漏北斗面南看頌曰夜半金烏出海東坐深鰲背懶施功橫穿古道抽身疾不借冰輪照碧穹師答云偉哉斯第一義不規而圓不矩而方一中繩墨則傷之觸之忌之諱之無病不發矣故忘言則得意忘法則情枯拔盡瑞草靈苗於劫外倒拈龜毛兔角於今時故先聖立旨云雪覆萬年松頂夜半正明雲遮一帶峰巒天曉不露是以垂手處正中有偏暗不住暗偏中有正明不住明卸卻通身甲胄立見太平勿令久住長安風光八面巴歌絶唱雷驚枯木之花玉線橫穿拽斷泥牛之鼻挾路頻頻機通回互無位次中明位次有雙關處絶雙關該而全其萬化不羡大千之富返而一以難收奚輸徹底之貧一朝撲碎玉屏風方信晶簾終不貴若投子因僧問大死的人卻活時如何答云不許夜行投明須到此即直下裂斷兩頭雙控俱虛的句稍具眉目則知雪樹梅花開午夜月巢老鶴早騰空亦且那邊不坐萬年床矣古今師匠承嗣其宗者若庖丁之解牛非斫輪之糟粕與諸佛祖同一自在同一妙用言滿天下無口過行滿天下無怨惡若但知其所用而不知其所不用大似王子寶刀指空説夢非兼帶而終沉莽鹵識觸犯而始徹精微若不悟鐵鷂凌空奚以測鵬飛萬里如頌脫屣上床沉睡後一輪圓月挂高穹據斯所證猶存毫沫之知尚涉瑕生之纍向這裏一刀揮得斷返聞涓滴非聲冰壺無影是名大解脫門大總持門如云起坐分明不住功果爾從緣不借則知一念遍塵剎不勞雙足走西東矣還見妙協弘通的的意麼直待石人毛卓豎始知明暗一齊蠲峰問大慧言四大解散時心識已昏如何回互既回互不得定闖入驢胎馬腹去也且道此時作何諦當峰著云甕中不走折腳鱉頌曰地閉天凝凍轉加梅因寒徹迸些花若於白處看消息大是尋春截樹丫師著云不借借中方始貴脫然來去未為奇又云回互的旨果如是乎休將驢鞍橋認阿爺下頷頌曰湛守靈知病轉加香煙脫去眼生花直須踏破澄潭底不喚珊瑚作樹丫師答云吸乾滄海玄珠豈墜蒼龍窟衝開霄漢桂輪不貯古寒潭萬邦靜而王化忘四海晏而狼煙息拔無根草斷筋骨於有住之鄉弄死貓頭碎髑髏于識盡之際秉大公不世之法絶窺窬紊亂之私若不辨其輕重之關必混亂於玉石之誤故師家出語揭古示今大須審細雖抑揚不一但為佛祖權衡人天標格不可陽施陰奪顯己滅人謂之道者家風謂之禪宗命令較大慧指心識已昏如何回互一問雖偶拈示於昔時實有沉埋於大意且濟宗如大慧之福慧圓滿行解具足者誠不多得弘揚斯道海內傾心九重顧問非唯本宗之門庭死拈活弄而四宗之關鍵無不披靡安有將回互大綱作生死岸頭事以勘學人乎如是則坐脫立亡之應可貴沉空守寂之必宜珍於大法何有哉設為是問蓋權宜所發針拶初機之輩或有是事勿則大相懸隔矣雖曹洞亦有回互中直截者或臨濟亦有直截中回互者然于旨趣大不可溷一失顧其建立之本必至困守靈知隨波落照可不細參乎且回者徹過威音那畔之根源互者攝盡今事門頭之妙用先後不居依正互攝始起于石頭參同契云門門一切境回互不回互回而更相涉不爾依位住痛拶偏枯舉之密密示之拳拳次傳而有雲嵒寶鏡再傳而有洞山五位相繼得有曹山三墮闡揚大化建立門庭當曹山時頓絶紙衣依倚之功勛後有九峰未肯首座全身之脫化剪除根塵器界之依光截卻有證有修之巴鼻不貴坐脫立亡秪為見處墮偏枯任爾舍利通身勿若臨機能轉步審如是法豈可以荊棘園同列栴檀之座宸極殿相看草莽之塗蠱毒反作醍醐草賊目為真主通宗通塗既不辨挾帶挾路豈能知若以去來不昏為回互之極則紙衣應徹底多時又何待曹山向末後施不借借之鉗鎚始得斷依依之根本到此地具得半隻眼誠謂吾宗下刃更利發藥甚毒絶蓋代之功非廉纖之病到來懶去攀雲樹回首誰誇鳳閣風透盡紅塵堆裏生涯方知大熾焰中吐舌故曰縱饒枯木生花去返照荒郊不值錢豈云梅因寒徹迸些花而于功位上強作主乎既不識迹混塵埃而敢明其挾帶乎古德云黑白未分前已過又豈肯向白處看消息而待尋春截樹丫乎首句以地閉天凝凍轉加不過學人進修階級總使寒威徹骨不能攀虯龍而驅虎豹穿嵒壑而入煙波秪可望隔籬之觢何嘗睹露地之牛將欲透金針而穿劫外以窺其奧者吾未之見也又著以甕中不走折腳鱉可惜三峰一生行腳全身困在甕中若不打破甕時直挨至彌勒下生還無起日絶不聞莫守寒嵒異草青坐斷白雲終不妙故將大慧一語看為實法誠如所見當作回護字用不當作回互旨看矣若易乾坤之互卦無互中而有互舍一而進疊以成之絶內絶外神化莫測餘互亦然是之言互者用如轉環古人立法味此若毫忽之差則不應律呂矣針拶不入水灑不濕猶是打瓦鑽龜漢若不向露柱揚聲處討個分曉正好坐參三十年或失腳迸斷紅線方知石頭路滑宜深心密證不宜坐守枯樁吾固云大慧斯問倒弄顛拈或未可測遞後之俊傑欲追求斯道者得向大海裏翻個轉身則不指涔蹄勺水為巨浪久久或堪同入此保社峰問景欣言見解人多行解人萬中無一個若識不盡敢道輪回去在且道識盡底人畢竟是見解是行解即今日應萬事在那裏安身立命峰著云腳底知前路頌曰髑髏乾盡生青草不借流螢一線光敲到第三雙眼直不知入地上天堂師著云斷碑橫古路霜月豁虛懷頌曰敲風打雨渾間事轉覺難同絶頂光迸出海門秋後影尚餘殘照落虛堂師答云交光互彩彼彼同明識盡無依見行俱徹景欣斯語病學人之理事未圓過在行説不到非萬中無一二也所云見到者握土成金觸處圓滿理無礙也超諸見量離諸有作事無礙也不取一法不舍一法理事無礙也體用渾忘理事不立事事無礙也若猶存見諦是名食不消如黑夜見物開口則墮理障所作則墮事障安得行解相應乎現前既是黑漫漫地識情流注何必待眼光落地之輪回乎若不得其真似葉公迷筆下之龍能忘情於見如李廣穿烏菟之石果得真見則見且不立況一切作用而不圓滿乎自能坐致太平高蹈毗盧我為法王於法自在復欲問其識盡底人畢竟是見解乎行解乎日應萬事在那裏安身立命乎呵呵目前山是山水是水人謂之嬰兒吾亦與之為嬰兒人謂之町畦吾亦與之為町畦吾亦不知有見解有行解亦不知識盡識不盡在天而天在人而人故曰四海之濱莫非王土率土之賓莫非王臣既盡髑髏之識必豁正眼於頂門能誅不戴之臣荒服悉歸於闕下山河眉目裏又何須問取腳跟萬法一微塵決不假螢光半線峰沒卻景欣活路自遭眯眼重圍故著個腳底知前路余不妨為汝添個注腳乃云終是黑漫漫其頌中道髑髏乾盡生青草余一喝云猶有氣息在次云不借流螢一線光余云秪恐全身在裏許又云敲到第三雙眼直余云亦非至寶結云不知入地上天堂余云終是亂走據此一頌本無大過何至逐句破消非搆言路之風濤為剪執迷之所向不得不為一按劍也如前二句以洞宗髑髏無識眼初明今頌為乾盡生青草宛若腐螢一線之光終不能全彰見行勿須寶也唯言所重全在知玄而復知要一一敲去敲到第三句則雙眼始直髮尖上迸將出來天堂地獄獨步超方以他宗之淺劣難同吾法之優深可貴宛如博奕渾似鬥雞既不忘見執之波奚以消權實之用總於出生入死如花開花落遇順處逆似流水浮漚斯雖履實地而不辜但猶倚功勛於力馭況欲向法鏡內數白論黃每誇驚人之業恐遭明眼之譏急令鑽得透敲得直要且未具見解之圓滿行解之相應殊不知暖不在火涼不在風明不在日暗不在魄會得毗盧不墮凡夫不會普賢失其境界是故螢火可熱須彌滴水可浸巨嶽不起于座而遍塵剎不假一法而徹蠛蠓大千捏聚萬類全該豈可列瓶盤之有異目叉釧以無同既不沒升沉之見必當和萬竅之音峰果不存秦楚之別則刮盡景欣熱腸一片究空無住住裂破不聞聞末法所賴在斯一舉讀者事當審諸峰問子歸就父又道推爺向裏頭且道推者是阿誰既是推爺向裏誰是同時不識之祖峰著云稱錘落井又泥深頌曰翻轉青銅鏡背看硃砂斑厚壙泥乾光生不用揩磨舊漢製從來體自圓師著云丫角崑崙齊伏道謾教帝釋放天關又云禹迹功雖異難明大舜神頌曰無事無身未易看始終機盡見情乾夢回石女來新照不借菱花點缺圓師答云法燈朗照方知見底浮沉正令當行須假重瞳再鑑封簾掩密室之風絶侶脫交參之路是以靈苗瑞草野父愁耘玉鎖金匙智人不顧非因木蛇夜吼寧知腦後神光未逢達者之儀怎得瞎驢滅卻説明説暗固是空拳誑小兒論要論玄應識假途滅虢計若得全超不借則能推祖父於裏頭一朝掩鼓息旗事可罷登於廊廟推者乃轉位也滅根本心也根本心滅則超過現量不問帝鄉之遠近誰驚暮夜之非常是以古德云賓主睦時全是妄君臣合處正中邪禁殿無人誰拂清風于白畫碧梧去鳳任教明月落重臺法執盡而見地圓根本脫而理事徹直窺髻裏玄珠可別輪王至寶如金光明經云如來言三種身依諸伏道起事心盡依法斷道依根本心盡依最勝道根本心盡起事心滅故得現化身依根本心滅故得顯應身根本心滅故得至法身既云教外別傳何使提挈綱宗假令別有規模未免斬頭覓活若果如是未夢見在若不如是未夢見在急須蕩盡聖凡情見方能不滯尊貴階梯如峰著為稱錘落井又泥深斯謂藥石除而反墮膏肓之疾鉤餌脫而復遭羅網之悲滯十成之死句困相似之疑城見處既帶瓦礫發言難印宗乘欲識同時不識之祖父舉步亂雲迷四野攜笻無路透孤峰如頌云翻轉青銅鏡背看不聞古德云向道莫去歸來背父又何許鏡背看也次云硃砂斑厚壙泥乾好個摩空句子不當落在點劃場中所云易分雪裏粉難辨墨中煤當悟綿綿化母之機寂寂真風一段峰既將穿密室何陷顧貯之泥塗更沒文彩于琢削豈能絶衆響而豁天真之提唱乎宜知語帶玄而無路舌頭談而不談又云光生不用揩磨舊秪如古鏡未磨時是個甚麼消息末云漢製從來體自圓不見寒山道無物堪比倫峰又用製作麼無有譬喻能喻此法總製得圓早已缺陷了也將欲古之又古深之又深竭力摸寫逼真得盡不知弄巧成拙揀點將來料掉沒交涉住住既道向亦不是背亦不是畢竟如何即是一喝云鐵牛撞倒帝釋宮百億須彌汗如雨峰問曹山立三種墮注者言師凡言墮謂混不得類不齊又明安不受食是尊貴墮須知那邊了卻來這邊行履不虛此位即墮尊貴矣且道曹山三墮意畢竟是那一種峰著云從來不借雙關路鉤鎖中間直下拋頌曰這邊那邊都不得合水和泥總不知牛斷鼻繩湖草緑牧童濃睡月低垂師著云落日海潮夜秋光腦後看頌曰天水勿違明舊德群龍無首殫餘知挾類混然成錯吉門庭三五不須垂師答云間花野草橫鋪古錦化春工山色溪光密布真風超象外全身入荒草徐行足迹混塵埃脅右書半行獨許狸奴知個事分明頭角宛轉巴歌故曹山有三墮之神樞大珠剖絶向之正受其法也如鼎繫足不煩輕重于其間似月穿波忘所合流于徹底明安復為布置一以折三以三冥一亦不另擬隨類墮之等則尊貴墮之差殊故云此三墮須明轉位是以先聖立法竭盡無餘摶沙全琢玉之功函蓋有藏鋒之勢且曹山始云直須回互末云將為墮且不是同也若使回而不涉必貯金城久止亢陽終遭旱魃一踏到底者透石穿雲三搭不回底迷蹤失步敲出鳳皇骨髓蒼梧空月露之形倒拔獅子之筋鸞膠絶絲桐之響等間嘯月高岑上要使清風刮地來墮之之意大矣哉興無緣慈于大覺之場作不請友於含生之類故教中有諸佛退位度生之義佛非有位也但居尊貴一路則無度生分若不令回機衆生無出頭分故曰轉位就功解珍著敝垢之衣轉功就位治水歸神禹之化本非物格東方入定西方出亦非格物南方人定北方起男子身中入定時女子身中不留意故佛不住佛之尊貴長鯨一吸海水盡菩薩不住菩薩之功勛森森露出珊瑚枝向果海中倒駕慈航一音演唱令其隨類得解返觀生佛平等了知無佛可成無生可度無行可修煩惱涅槃究竟永盡如云大通智勝佛十劫坐道場佛法不現前不得成佛道果若有佛可成有法可現豈得鎔盡規模于大冶消除法見于當途者哉是以一徹不受食之義真俗融通了然無一剩法矣如云這邊那邊都不得合水和泥總不知斯堪識異類之權超言象之表控神駿于四海尾絶纖塵駕金車於白社步潛芳草出豁古人大意直分隨墮玄津言深法妙理到事圓如末云牛斷鼻繩湖草緑牧童濃睡月低垂是意本出宏智四借頌中發源然宏智雖云識盡甘辛百草頭鼻無繩索自優遊但其結個不知有去成知有始信南泉喚作牛以借借不借借出曹山墮旨始終一貫今云牧童濃睡月低垂人法隱隱尚存不過露地安眠牛雖純逸未忘拘牧固貼然猶有待此正是功行邊事豈能證入不知有去成知有耶於此不盡安能回途得妙而堪合水和泥耶故云恐未徹其底所云脫盡唯珍之至見能通萬類之齊聲戴角披毛隨類自在方得塵塵混入剎剎圓融作人天依住為大地指南如明州布袋普化木鐸真俗不違始終超越奈何今之學者雖得一線之粗知未徹雙輪于足下將使搗巢穴而碎須彌去御樓而行草野以決槍榆之勢思同海運之興寧有是事哉誠謂門裏出身易身裏出門難冷地回頭一覷總似錦獄安身猶帶幾重枷鎖而欲自他俱利誠為從井救人豈不自相欺陷乎是以羽毛不備難透九霄藥病未除所行窒礙直須空洞無物表裏精微培風摩背不為天閼有攫霧拏雲之勢翻江攪海之能然後可活醃透網金鱗重煆悟後骨髓於是無位可居瀟灑任溪山之異無法可示錯然制大用之機不寶空王之殿誰珍有治之風故寂音頌尊貴之旨云生在帝王家那復有尊貴自應著珍御顧見何驚異闡揚既盡靈鑑休違神化無窮如指諸掌目其入草求人老胡再起何以加焉得明三世諸佛不知有狸奴白牯卻知有至此則金不重礦矣峰問曹洞回互當頭臨濟臨機不讓師法眼家問如何是曹源一滴水答是曹源一滴水且三家落處在甚麼所在峰著云東西四不得擊擊鼓當中頌曰雙控俱虛直下針主賓推讓正全擒劈頭一撞雲消散個個歸宗不用尋師著云斷岸翻身心法盡笑看走馬落帆風頌曰負勝輕遭腦後針明修暗度魄先擒功成籌畫歸三傑帝業天然不費尋師答云法律者國之柄綱宗者道之樞國無律而禮義衰道不宗而異見起是以過則匡之失則革之長則去之短則續之誅偷心于言下絶知見於胸中救百世之弊豁後進之盲奈何法既久而岐更多道力微而姦愈出悲王疊起目不奈看狂子交馳頑嚚塞路空懸慧命所繼誠難學者陷牛迹之知主者失綱維之大互相訛亂影射失真嗟噓哉是以仲尼不觀於禘祭季札獨樂於韶音慨古之法不可追痛今之世何所視三峰斯舉深愍顛危隱微之間將使回狂瀾於既倒昭著其所不易耳惜今時據匡床拈麈尾者一味印泥印水説妙説玄絶不忌觸諱之妨又奚知衝關之要學人言語似鸚鵡傳聲隨地生苗若青蘿夤緣渺茫祖父家風失顧全身負墮當此祖庭秋晚之際邪法橫生之時賴有重拈於末季欲令破長夜之悲睹前聖之範稍為鼓舞庶幾昏昧者一朝休歇頓息狂心應知立法非易承當非易行道非易判斷非易不令忽於正法既得升堂必宜入室夫五家門庭者通關要道曲為今時撥開見執機輪拔斷死生惡刺師師大用耀古輝今打雨敲風佛魔無地後世無敢少加於毫忽者因而尊之寶之一時推重五宗之源肇於茲矣所要者貴于當人識病識藥知重知輕兼識藥中之忌勿則顢頇佛性儱侗真如窮劫悟無有日嘆今淺識之輩誤揣其蹤或擬臨濟之法直截痛快一見生擒擬曹洞之法廉纖轉折枯木死灰或美曹洞之綿密準繩呵臨濟之橛頭鹵莽并不審其玄要主賓正偏回互蓬塞胸次亂統麻纏其他宗者湮沒無聞秪堪口挂壁上安敢偽指虛張亦知其無所從而譏誕矣豫試問云如砒藥鴆毒示之于人人必知為害己者授以良醫反致於起死回生若示之參苓朮附人固知為益己者授以庸醫反速于戕生致死其性也本無向背顧其用之之何如耳若主持是法者道眼明白參玄扣慕者篤信無疑一跨其門偷心立死久之得以續其法而弘其化豈關宗有差別法有淺深耶亦在其人之擔荷何如耳若半青半黃者道眼糢糊兼於學佛者掠虛打哄聚頭嘈雜妄判古今謬改金根誤讀盎碗非法有優劣也亦在其人之臧否何如耳一在師資緣契二貴作用光大如握寶珠隨方應現明眼者識珠之體盲聾者昧珠之用若然聽其當頭回互也得臨機不讓也得隨聲破迹也得乃至晴空揮霹靂持書不到家月落潭無影拄杖子𨁝跳得遇烈烈英人徹底從頭透過有時恁麼也得虎嘯龍吟富嫌千口少有時不恁麼也得草枯水冷貧恨一身多有時恁麼不恁麼總不得鞭斷虛空筋骨撲碎金剛腦門一棒一條痕一掌一握血貶釋迦于鐵圍山內不令口邊水漉漉地推達磨向糞掃堆頭休教黑豆換人眼睛一花既散于十方五葉必光於塵剎莫分優劣唯貴行深知法道不易方堪保任此事邁古超今令法久住始不作佛法中罪人虛喪其實也如云東西四不得擊擊鼓當中峰何事一光分左右同室列西東宛如中外相持大似途分界限四既不得中亦不得矣如昔普化云明頭來明頭打暗頭來暗頭打虛空來連架打峰至此將欲擊向何所四方得麼中央得麼果能衝開巨浪便可握手相參勿則困死方隅埋沒千生腳底敢向何處存軌則耶如云雙控既拋象外金針是可橫穿這邊那邊更不容其住足矣次云主賓推讓正全擒吾宗謂君臣合處正中邪豈非直下之正全擒耶濟宗謂未容擬議主賓分到這裏主賓亦且無暇推讓矣得透千重鎖甲能握肘後靈符必不滯山澤之幽間迷江海之浩蕩顯舊家風布新作略展處肅肅秋風多帶殺卷時昏昏古渡絶人還縱橫唯心之旨發而無不中節矣還識三家落處麼震威一喝云青天驅鬼魅夜半碎桃符峰問洞山問龍山老人如何是主中主答云常年不出戶又別載云如何是賓中主答云常年不出戶且道是訛誤耶是各有道理耶峰著云升堂難入室坐室不升堂頌曰醉深獨貴和衣睡未飽應憐放箸人拂子挂來何足問君臣溷失有家珍師著云玉鉤雙控冷庭際闃無聲頌曰冷冷白露蒼苔溼寂寂重幃遠御人萬里秋聲消漏永未央高臥冷衣珍師答云多處不得增少處不得減有主何妨頻話會少處減些子多處增些子歸來門外草青青口生白醭火焰裏凍倒蒼鷹戶長青苔月明下喘死玉兔擊水無聲應知意不在言敲空有響誰識來機立赴是法固無定所妙應要在當機所謂説法不隨時總是非時説如鳥飛空而折翼似箭射的而斷絃聊通半線要使破惑除疑稍展鋒鋩必使聞風喪膽故師資酬唱識觸犯不昧雙睛賓主才分落思惟便成鈍置更欲深登祖奧非比截流之機而有回瀾之別橫徑才登喪亡立地輪車能轉一任指南主客未清必當負墮是知龍山此語總不辨其訛誤亦顯知其傳之之謬也較明安立吾宗四賓主云以正中偏乃垂慈接物即主中賓第一句奪人也以偏中正有照有用即賓中主第二句奪境也正中來乃奇特受用即主中主第三句人境俱奪也兼中至乃非有非無即賓中賓第四句人境俱不奪也兼中到出格自在離四句絶百非妙盡本無之妙也故丹霞序云黑白未分難為彼此玄黃之後方位自他了知先聖立法目擊道存果龍山實有是答假令別有道理吾必自知其冠履倒置所謂毫忽之差則不應律呂矣斯必傳刊之謬非龍山有此答耳如洞山首問如何是主中主龍云常年不出戶即直下舉向上機徹頭示末後句不睹堯眉八彩那知舜目重瞳次問如何是主中賓答云青天覆白雲應知垂簾任補袞之能靜鞭聽燮理之佐控萬邦而執帛駕六御以追風問賓主相去幾何答云長江水上波為他拈卻依稀驚散落霞與孤鶩齊飛直令揭開當面獨許秋水共長天一色問賓主相見有何言説答云清風拂白月回看東君無聽運之勞黃鶴有盤空之勢得間題取一篇不必復循崔灝甄別龍山答句光華似鎮海明珠徹見魚龍窟宅是以洞山不知膝之屈地矣隆望既重于當時正眼必超於終始此固明易可分勿煩其贅啓後之大匠力能排闥直入其室雪曲陽春不妨高和珠回玉轉任運從心峰之所云升堂難入室坐室不升堂是為意句俱到非惟徹己之深可豁後來之鑑其頌以拂子挂來何足問此直引百丈若不再參終未識主中之主古德所謂客情步步隨人轉有大威光不能現甚得敷演之妙末云君臣溷失有家珍峰將徹主中之主然個中略經點綴則反失其真悉是刺腦入膠盆未到獨步超方之絶頂幾欲觀方于眉睫者恐無是事矣故曰觀方不至彼至彼不觀方既云至矣到矣君臣道合矣臣主相忘矣則兒孫戴不賞之功祖父殫密室之令此外更欲搜索箇家珍出來何異卵生毛馬生角徒將九轉靈丹博作砂汞中物力思追蹤覺範瞥興大用炫耀今時反成鈍置是以頌意不宜逞奇一逞奇特非惟滅真喪智亦且空勞無益如覺範聰敏過人擬將洞山宗趣改腔越調以兼中至易偏中至絶不揣雲巖立旨依根分布從石頭發源闡揚正偏回互綱領所謂明中有暗暗中有明故寶鏡三昧有如離六爻之喻因其卦體內暗外明內柔外剛錯綜奇耦文彩昭著起則初爻二爻為一疊依體立用次則三爻四爻為二疊體用齊彰再則五爻六爻為三疊體用俱隱若𠁼字三法縱別不成天然而妙是之疊而為三又云變者以初陽二陰一位為正中偏以二陰三陽二位為偏中正以三陽四陽三位為正中來以四陽五陰四位為兼中至以五陰六陽五位為兼中到外卦陰居陽位陽居陰位兼帶忽來敲唱雙舉若嬰兒五相此變盡成五縱橫不離本位寂音竟於互卦分爻用巽兌大過中孚重離配成五位內外錯安正偏倒置斯出一時臆見不諳吾宗血脈遞相沿習自謂千古定案不可增改其毫忽在覺範名稱尊宿尚乃失辨于宗閫況後代傳載者乎是以續録于斯昭其宗旨正訛不易之論復附近者有以二株嫩桂合翠交陰上符馬祖實由龍山以洞山請益龍山賓主話為五湖入海同一濕性云云蓋石頭馬祖淵脈雖本乎大鑑一源然洞山繼雲嵒之道必當確定宗派如以龍山符馬祖而攝歸洞山則置藥山石頭于何地既云五湖入海同一濕性何不合流至曹溪而溯歸少室斯謂五派同源法門公議今欲獨分注于馬祖下則競流也非合流也請觀相向以孰為是且洞山乃述行腳請益諸方始末若此為符則從上諸家尊宿誰不歷之參之要使其盤根錯節貫之續之則一往而無抵止矣脈脈相承久而尚為抹殺況參請者乎如雪峰録有云吾從先德山石頭以承傳此祕密法門一段豈不昭著祖系今世力欲鉗結其口掩昧其實將石頭下雲門法眼二宗硬欲插入馬祖派內合臨濟溈仰以印馬駒四足崇其偽碑爭馳未息況更突一洞山參請之機緣筆為上符馬祖列于庭下毋乃太高己門戶而越分他宗將起撤鄰燈而歸光一室得無門墻桃李乎因并録此以俟明鑒峰問臨濟祕密只貴賓主曹洞亦有賓主且道同別在甚麼處峰著云莫踐履混飛騰頌曰主主應須體用分杖頭末句父歸根相參了得方珍重利處應知鈍已存師著云倒拈無鏃箭射落一雙雕頌曰玄偏不附正何分踢倒重關始絶根贏得太平樂業後薰天灼地了無存師答云孫子減灶添兵滅狂雄之膽孔明減兵添灶避敵國之鋒鳳蟄龍驤奮發天然儀表秉符執節維持閫外威名電火破潛形異怪雷聲震竄迹妖狐交參未許揚眉入戶豈容湊泊故大用不假安排要使塵中辨主打疊重關一路須知化外來賓或互同聲吼或調別宮商赤身挨白刃那堪顧險思危合眼跳黃河須是銅肝鐵膽主賓雖殺活不同明暗合全提無三故不執正偏之賓主外于四料揀難於互用也如臨濟賓主師家學人交鋒處固與洞宗稍別但臨濟兩堂首座同時下喝濟云賓主歷然又云一喝分賓主照用一時行此與洞宗賓中主主中賓扣擊當陽不移寸步雖前輩罕言及此蓋知斯旨未有不同聲相應者又洞山因示僧云客中辨主尚未分如何辨得主中主僧便問如何是主中主山云闍黎自道取僧云某甲道即是客中主如何是主中主山良久云恁麼道即易相續也大難斯即洞山推出直下主賓打破劫前古鏡死水裏鞭起陝府鐵牛藕絲孔拽出嘉州大象半提開萬丈冷門庭雙控驀全收一句子故濟宗通二偏兼帶曹洞合縱奪主賓門庭施設各有條分關鎖齊開誰拘出入如洞宗之賓中賓此雙明不類非有非無人境俱不奪即第四句兼中至之大意本非濟上同一互用峰必以履踐飛騰列為兩途恐無此法履踐宗師家本也飛騰宗師家用也雖進止不同其履踐本一證是道者誰能出不由戶如操愈密其道愈光不因黑漆漆地履踐焉得祖道光揚將欲舍卑而崇高難脫行遠必自邇峰專執景欣一語而泯滅洞上者豈不發千古一笑且進階之漸者始云見迹入草制奔烈狂牛次曰忘照別峰脫象王回顧藥病盡去迷悟冰消然又不可不履踐故曰見道方修道不見復何修又云理雖頓悟事以漸除若一知而不保任久久失初恐醍醐翻成毒藥又如車二輪如鳥二翼若單飛騰而棄履踐謂之有用無體單履踐而失飛騰謂之有身無智故體用渾然本無二理今棄根本而附枝葉吾不知法之與人為何見解之與行解為何是知斷不可判為兩途矣較主中主者即正中來此根本同出今頌以主主應須體用分則宛同賓中主非主中主矣就于濟宗之主兩合參之亦未見有體用之可分宜將句中應須兩字易作難同或可頌之如石門著云萬里絶同侶斯竭盡三際可謂濟上之直截者若于洞宗所答猶未盡善況云主主可分體用耶如云杖頭末句父歸根之句斯盡美矣但不可死列定在棒上之命根分為角見而細之又細外之又外扭捏相參則在處吹毛斷不喚作鈍根阿師也慨今道愈凌遲真偽雜亂踞斯位者不思一視同仁每議臨濟以棒喝為本分曹洞以語句為本分又云語句你家的棒喝我家的不可互相混用云云試問當時祖券未審從何派定一有棒喝相關便謂之私竊者則淨因一喝不當分五教矣秪如濟宗言句可使克棟則不當竊洞上矣天地之道體大用大如月印千江必注意執為定法何得響應十方耶非惟臨機掣肘亦且亂統難支又以朝入東門便謂東家之子暮入西宅便謂西家之兒互相攻擊失辨根苗共陷于不智之域磨唇礪齒何所事焉深有三峰述其大端拈以問吾宗之同異余因茲不避擊撞敢為布其要略也如此峰問曹山四禁莫行心處路不挂本來衣何須正恁麼切忌未生時且道禁之外又作麼生峰著云切忌從他覓頌曰誰人影子不隨身吹滅青燈始見真昨日看山攜個杖幾回行過石麒麟師著云我今不是渠頌曰撲碎珊瑚倒卻身樓頭見月總非真根株不向當途截走馬徒教索翠麟師答云滔滔湖海寂寂祖庭説道廣似牛毛見道罕如兔角未堪話會何地施權不得已先聖向塵勞內打開布袋入水和泥令行處嚴防密護露布困已伏之兵戈相逢時斗轉星移彈鋏驚歸途之客思謾云撒手歸來無一事到頭末後有千差故曹山禁已賞之勛階拔過窗之牛尾果得深經大冶去寒灰枯木之沉痾脫湛寂澄清之冷焰疾破渠原是我翻身直下一刀推開我不是渠回首鳳沖霄漢除卻本來照瞿曇不受印於然燈掀翻腦後關善財可罷升於樓閣此曹山深經洞山之爐鞴故能顯祖父之門風不料去聖時遙人心不古尊慢立生倒見競出紊亂其父子妄言曹山為徵洞山睹影處所發又陷其能救師認影之病故有説云曹山立三墮以明尊貴設四禁以辟邪途捐不賞之功絶未然之禍渠無國土何處逢渠本是無瘡勿傷之也後世不曰洞曹而曰曹洞其在此乎云云讀此使人心駭神驚一亂其師承之分二滅其繼法之始千古之下未有子加父上臣令君前設有是聞必為悖逆之賊世出世法豈容若是倒行耶雖云智過于師方堪傳授苟不如是何堪紹隆玄化然於名分亦可謂之子父乎今稱曰曹洞者曹山仰尊六祖脈自曹溪而分布凡所住處尊曹溪以表之為洞山統承六祖之道是石頭青原而溯其上重于尊祖敬宗之大節近代毫不辨其實迹枉藉聲名蓋覆洞山之上不亦忍心害理乎況洞山過水睹影處惟曰大悟前旨蓋脫前無情説法之悟處不忘今日一見即脫之矣豈有睹影而復墮影耶復至雜聲塞耳以洞山情之所結因見不忘情見相私語沉窠臼片瑕千纍衆病一源而力為推之陷之噫非彼之過也所謂我眼本正因師故邪信哉言乎且洞山偈云渠今正是我此述前得根本智之迷中悟我今不是渠此正脫根本智之悟中迷故曰不居正位那守大功峰全不蹈浩浩之通衢反沒昏昏于四野心源已昧圓鑑難明惡其示人以難窮劣反圖以勝將使埋兵掉鬥傾固欲亂以危根本向不清于所舉機用敢誇誕于今時捏洞山犯四禁之知謗曹山嚴救師之病一刀斬斷不墮廉纖甚矣乎峰何爾迷忽至此又妄以高峰睹五祖真讚打破拖死尸之疑而合拈云大似洞山過水睹影幾乎廉纖出五位幸于枕子落地處了卻不失為濟上傑人耳云云今判睹影為未悟五位為廉纖將欲負螢光而超日月困折先聖之道不亦罔人歟又謬解渠今正是我我今不是渠句以影子之渠為我之本來人而我者個穿衣喫飯底都是羅家佛之説以洞山大徹句為隨身影子同于外道之我故囈言直翻五位廉纖之影子突出大法之吹毛捏塑千般變幻疊出豈不罔之又罔歟毋怪峰之臨末稍頭答個身後事云床頭老鼠偷殘藥壁上孤燈照舊衣之句噫苦屈殺人誠謂情之所結因見不忘相傳底蘊所見如斯宛有來去之可依心境之可別欲稱寂音再來恐名實未相當耳況曹山四禁秪發揮得洞山前一句恐人在法身邊認取故云枯木崖前錯路多行人到此轉淆訛體盡最初與末後不教兩眼自糢糊速宜撥轉機軸尚要去任運之所倚脫玄妙之法塵打抹精神從頭細撿一一必須從自己胸中流出稍有借路便為束縛是知鸞輿不共間車輾鼎沸乾坤瞬息平豈如峰不揣古人用處之隱顯弘法之精嚴自逞尖新令人不可參取本來面目若一參之即是羅家底佛墮洞山之影曹山禁內事也因而著為切忌從他覓驗此則洞山前之知有峰尚未能聞矣況于洞山後之不知有而峰可得聞乎所見宜其言之所存固其宜之因而妄判洞山未裂棒上之命根乃頌個誰人影子不隨身擬將洞山從太虛空按入水底秪恐徒施巧力自招汩沒果能變盡白雲雙輪獨運則峰倒舌之罪余當代領但恐其力未充耳次云吹滅青燈始見真可惜許不知費卻多少鹽醬如有燈時見明吹滅時必當見暗該而言之未超乎明暗圈繢急不迥脫則吹滅時亦且未是真矣如石頭參同契云當明中有暗勿以暗相遇當暗中有明勿以明相視明暗各相對比如前後步較此又何待吹滅時見不吹滅時即不見耶豈不自成鈍置欲假眼光定動之粗知塞卻沒縫罅中之伏道千雕萬琢計湊程途昔賢非今時之操道在人而豈在法乎故曰仁者見之謂之仁智者見之謂之智如峰倒見固其分耳末二句云昨日看山攜個杖幾回行過石麒麟雖則顯個人境互融的手眼殊不知幾落臨場之困矣危乎古鏡臺前間影草才一顧立喪深坑快哉大火聚中帶雪花拈得來不妨賞鑑所謂未經大海休誇水除卻須彌不是山當待三峰再於向上打個關節直使從空放下不令步步登高一朝迸出頭角眼爍爍氣雄雄搣斷古佛眉鋒撞倒崑崙柱腳心行如破暗之珠機智似準平之水更不將生滅為心中毒眼中塵然後整整肅肅坦坦夷夷出一言半句徵古別今為法道干城作人天依止掠盡魑魅交馳標分真贋雜沓虛己應世自他俱利方曰法門盛舉勿則何補于事非余重言亹亹橫衝直撞如狂醉之夫祈彼存心朗朗掃除積弊似中天之日陰霾立霽復睹徽猷不至幽沉法運令葫蘆提于千古之下峰問三種滲漏中語滲漏有機昧終始明安等語究竟未在且道如何是機始峰著云笑殺當今一橛禪如何是機終著云未夢見在頌曰前牽後扯浦州麻只道奔騰總是他不會牢關最後事得來水影是蝦蟆如何是機始師著云木人夜半穿靴去又云犯則禍生如何是機終師著云石女天明戴帽歸又云一齊按下頌曰始終機昧見如麻疑帚疑箕摸殺他未跨銀河穿月窟到來聲韻總蝦蟆師答云推不向前坤應合作三連抑不落後乾可剖分六斷打破甕跛鱉飛騰潰卻圍降旗立豎這邊那邊總不居魔宮佛殿都裂碎如何是機始句階前冷冷霜花折角泥牛穿古道謾為斫額如何是機終句窗外遲遲月影萬年童子扣松扉休得躲跟談笑壓風雷之勢偕行搏虎豹之雄欲探吾宗要道勢如鉤鎖連環正偏合響首尾全提未經絶頂罔指輪王髻裏珠不入九重謾度儲君身佩劍撿點得來眉毛已墮收拾得去乳食未消打麵還他州上麥唱歌須是帝鄉人故云婆婆和和有句無句終不得物語未正故卷舒莫測井底蝦蟆吞卻月縱橫無犯三更不借夜明簾明得極則處方可怡情物外笑傲煙霞略知古人鼻孔大小拈幾節家常茶飯穿一串陳爛葛藤倒展旗鎗明修暗度不妨快暢勿則盡成謗法之過如昔宏覺和尚答僧問如何是沙門所重底事覺云心識不到處此誠純金不礦雜毒全消如語者實語者真師真道真法而寂音尚以宏覺答處謂落十成死語固非洞宗所宜答者試看古人作略好手手中呈好手愈出愈奇愈精愈密總使震若雷霆而不為怒嚴如霜雪而不為殘伏尸萬里而不為刑雍肅上下而不為睦學者別得輕重碎身塵劫未足以報欽知正法不私道統萬古若徒知有己而不知有人立言不根其本至狂放如旋風敗葉競流似河決崖崩自謂悟深法富高出前人歷劫爭衡日接眉目而不自屈者得非魔外之儔歟如峰著頌機終機始等語既失前賢之案復傾矯世之風全不思問在答處答在問處兩既失照始末誰圓擬欲烈雄才於祖道假董筆以流芳勢有拔山力無捉兔是以法之難且險者高則困于智中則困于名下則困於利抵掌播一隅之見紛然棄已操之功終日提撕徒增黑業且三峰一生主張大法每在吞鯨之志惟嫌一橛之粗深心細密力整頽綱斯舉既失照于前所用誠難達于後未審時之所行何道所踐何事徒使圓而幾向方矣如云前牽後扯浦州麻只道奔騰總是他試看龍門躍尾若左旋右轉必遭點額而還提唱宗乘如東穿西鑿則被藕絲絆倒峰何以自迷當局失辨來機不知牽扯個甚麼奔騰個甚麼大似罔兩以影問影又云不會牢關最後句得來水影是蝦蟆慶幸三峰徹最初句也會末後關也當使破玄黃而不悖攖萬法而不撓既知其所知則知其所不知矣反不脫身外之影復追求影外之身轉至全身受陷沒向千尺寒潭之底沉醉清磯落照之中不識家家有路那知處處長安將欲鼓波濤而淤塞洞山之破影走文勢而束縛高閣之清風使天下後世盡尊其一家之統以謂前無古人後無作者無奈目空霄漢者終不隨其波而揚其塵遞相亂清音于別操也夫究其法最要一路先除我我次空見見我見不除總智如鶖子亦將負墮所云直心是道場無虛假故三峰自問而自不知者因其懸情高下反為籠住鷹揚歷觀過去來今舉古未聞有此不見泐潭頌語滲漏云木人嶺上輕開口石女溪邊暗點頭斯謂鼓掌於風輪際下揚聲在絶頂峰頭橫穿萬象直鎖塵毛撒手懸崖脫兩頭之玉鎖沒遮攔處突大冶之金丸非久歷其道者莫能曉之頓絶語中滲漏之患不昧終始者也復云堪笑當年李太白夜來還宿釣漁舟斯云煙波渺忽徒追漁父之蹤玉闕深沉誰識進退之要不潛牛斗之光難釋御樓之顧蘆花雪月釣寒江幾處渾然迷大澤是明其猶昧始終者也先德頌式光芒絶勝何似三峰不思豁其所指反被一陳黑風迷雲塞霧視金闕為乾闥婆城聽九韶類風馬牛韻會牢關不會牢關全不問取腳跟見水影脫水影千虛難逃一實既無照膽之光誰解撥塵之見葛藤窠裏牽扯不休青草池邊喧聲未息在峰如果會得牢關最後事則古今天地古今日月先聖後聖其揆一也于中自當磊磊落落直下絶其獨尊之蔽何妨喚佛祖作癩狗泥豬撞倒天關翻回地軸悉作雷音震吼風聲雨聲草影蟲影撥萬象不撥萬象把將神劍一揮細知古人脫巴鼻處絶廉纖處光前絶後如旃檀樹寸寸皆香徹底風流似珊瑚株枝枝撑月腳尖頭踢出佛來誠不虛誑方可為物作則用拔諸苦如執定所向自是他非到底終在黑山鬼窟中自沉自屈落始落終茫茫一去不知其際將欲何為哉是以道貴乎知止一至其無可止之地頓越始終如易之艮卦以其終萬物而始萬物故曰艮其背不獲其身越始也行其庭不見其人超終也復頓絶取舍兩頭之餘波又云兼山艮君子以思不出其位若兼帶旨也悟此則無法不彰無關不破是故提綱立法之主掃除空有不貴多知見盡理圓平懷不異無心應世竭智愚于入流忘所行超物表演一音於隨類知歸道可公諸天下機用豈別前人秪知步步向前不解心心退後直犯不起之疾難於藥石之攻所見如斯而已本不循中行大道故陷乎曳尾幽蹤未辨偏正倒邪奚知禍生肘腋毋怪凌行婆昔日指浮杯之病耳蓋因心私則物礙法空則見圓是以讀其書則知其人或三峰一時岐路何至承其道者甚欲深父之蠱廣載流行至使罪通上古隱然而不為念者其心果安乎且言者乃君子之樞機是非之定案統天之道代天之行傳諸信史臧否立見如春秋經世之典不議則已一議立破姦邪之膽頓絶暗昧之頑是以可筆則筆可削則削總于聖人再起而莫敢與之抗衡者唯其公而矣況峰進于道者反以私昧正堂堂祖令赫赫典型法道雷震於天下誰能為汝蔽之乎洞山所謂濁智流轉則語滲漏今斯頌逐處窠臼全身勝負要使言言見諦句句朝宗至耶否耶吾亦勿知之矣急須舉步出靈峰漫向寒嵒空斫額畢竟如何得不昧始終句乃畫二相云木雞啼夜半玉女斂神鋒透得玄中旨方明自性宗總結云重言者心不敏好辨者神不全固欲攖彼逆鱗必蹈不測之險奮身而不顧者余有所思也于中由辨之不早辨者非一朝一夕之故其所由來者漸矣三峰斯言之漸不得無辨如其立問著洞山以目前未必機銖兩睡中先付定盤星斯謂之拈古可乎以春秋一字便誅心詭御猶來傲得禽斯謂之頌古可乎以只恐竊符私奔者定然三尺不相容斯謂之代古可乎以始終頌為不會牢關最後句得來水影是蝦蟆斯謂之徵古可乎或云何以將此答頌逐句破消恐非法式余曰此隨三峰顛倒以緇為素者也讀其問之之異頌之之非是法式耶非法式耶乃謔注耳喪心將千百年來祖禰鏤刻窮奇星分斗布宛如精衛填海更不知愈沒而愈深愈鏤而愈固機設萬端事無一就若存心光大決不自相矛盾矣請思臨濟之始曹洞之先昭穆之序是少室耶非少室耶根源既不列于空桑祖脈豈可別於中外三峰亦一代偉人也濟宗得之而稍振真俗融通薰灼當世聲名為之羅盡假令龍山懶殘再生於今日恐未有其人躡屩擔簦尋流而扣慕者矣生今之世遠古之道深慨遊學之士唯隨影響于熱鬧場中本無心汲汲於生死驅令向冷灰中一覷則反走且不暇欲使入龍巢探虎穴而擊扣者斷斷無是事焉惜乎末法之衰淺如此近之得道真流既高升祖席大闡宗風應存厚道完固天元不當翦伐一空宜敬以直內義以方外而德始不孤綿亙流遠稍分左右之袒偏向方隅不循大體一經盤根錯節斤斤然將有造物而奪其魄者可不懼故嘗聞大慧聲占諸方道布海外然其作用亦少植元氣此美玉之微瑕未幾傳而頓絶不意一木訥瞌睡之虎獨當濟上之門風流通正法眼虎丘其人也歟慨今之世罕聞是説此亦深為厚德之至言非泛泛而不經者念某學行未充宜其身後而後之不宜聲先而先之冒此不可逭之罪狀無位而越言無聲而答響宛似負山之蚊本不知量但彼立意詆毀太甚欲削其迹而廣其言將使疾行大張旗鼓兼之寥寥數十載莫敢誰何細驗其案難乎其以是為非以虛為實設疑玩世變幻虛聲傳訛既久恐因其私而挾樹之因其鳴而隨和之更不塞其濁流將有泛濫而不可制于後者故不忌犯彼之鋒鋩直使斷其籠絡且塵勞之士有蹈白刃而不驚履危機而坦易如昔之藺相如也衛主入秦視身如芥當此虎視天下之強雄毫不為畏勒三擊缶而顧書册歸全璧而立破陰謀使其不愚弄於趙者亦不至愚弄於天下矣況擔荷佛祖大任苟患得失之心慮冷熱之勢素餐尸位屈蠖偷安可使之然乎余雖法門所不齒者然耿耿餘心秪知仰體祖宗之法推戴從上之源悍勞忍苦未嘗少間恨不令三峰再世而為面質也奈何窮途日暮世衰道微悠悠蒼天誠何心哉食人之祿忠人之事沉沉祖道繼何人哉思之不可得當質諸鴻濛至人懇施無諍三昧之光立消隱伏弘通正脈深何幸焉更荷海內宗匠勿較某之狂悖不至因人廢言使和融向往明鑑後來毋教畫地而趨以傷吾行化其有用之用全其無用之用如天普蓋似地普擎不亦大乎再睹雙雙玉桂久廕群生兩兩宗風遠注法味了知真師真道可續而不可授可得而不可見若白澤圖秦宮鏡不至繩繩慧命滅沒波旬豁其聾瞽應知一回拈出一回新莫作是非來解會讀者必強目為堅白之鳴不能聞聲于象外密契乎天倪一任心之所役目之所眊萬竅之怒嗥調調之刁刁作聲沒響鼓扇後先余悉付參寥子置於混沌之地果欲有言耶以俟乎聖人再起著然存而不論果欲無言耶以返乎無聲之域泮然議而不辨權衡在手輕重自知眼透頂門不迷終始台山智靜述于照膽堂
