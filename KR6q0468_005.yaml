body:
  text: 侍者德頂記録示甬東如幻衡山主古之住山者個事了辦表裏無疑故束一芭茆獨坐窮峰目視雲漢作天地一間人雖承其事亦出乎萬不得已恐慧命孤絶非因名世也既荷之後恐不勝任尚直入千峰之上深埋頭角篤志力行如勿應世則已一朝應世響震十方師範天下傳諸不朽本乎見真行實故山可使移聲名不可使沒唯一真而矣近代浮淺不堪綱紀大壞以禪道為裨販短徑學者于道未經染指便乃鼻孔高至梵天蓋最初既偽于心向後復偽于人沿習惡見如膠投漆日往月諸恬不知怪上則高名中則循利下則靡所不及一朝失志變異疊出本乎見虛行偽至是無不被偽所敗宜矣智者非惟不忍見此亦且不忍言此子既有志法門當磨勵身心到其所不到行其所不行莫向門庭上討取冷熱唯于行解處脫略今時梅子熟時酸盡諸人齒頰钁頭𡎺處斷卻衲子命根不負前賢豈慚當世如是則住山一事了辦無餘更復何言示映石峨禪人操道之士一味平懷二六時中若太虛空無一毫髮粘縛亦不裝裝點點無事生事亦不掘地討天空裡擔枷但一念萬年去乾爆爆地去自然頭頭進步不費纖毫氣力若強生枝節胸次壅塞非唯現前打疊不開臘月三十日到來必至腳忙手亂萬劫無出頭分切宜慎之示文學在甫大姪諱肇茲此事參至結角羅紋處不宜坐守枯樁如萬丈懸崖撒手相似危亡不顧拼其心力直下劃斷智識俱盡自然心體寥廓豈容擬議中而能得耶秪如香嚴上樹一著足不踏枝手不攀枝開口則喪汝身命向轉身不得時定睛一看畢竟如何解交直待大死一回拶得露柱攢眉虛空叫屈和底一脫便是到家消息親見香嚴立地處也努力參取莫負莫負示沈正參居士淨土關鍵吾佛運廣慈智度諸萬類雖化門不等唯淨土一階獨為普遍攝受三根末世衆生行解未全言過其實參一機一句未得四稜踏地邈視先賢指淨土為鄙隘噫去古既遠人心更薄學道之士痼疾惡風師者半學者半見地遑遑揀點身心到不如三家村裡俗漢豈法之過歟貴在平日操之深深用之勤勤則禪宗與淨土無二無別何必分途列轍為是非耶吾土蓮宗從匡廬遠公之後相繼其化線線幾絶幸雲棲老人從冷灰一爆向惡狠狠風波海裏摝盡魚龍末法衆生不知先賢往迹如傅大士感七佛隨行永明壽流梵聲帝闕明教嵩頂戴持誦晝夜不徹彼大尊宿尚爾若斯況近代人物不能較其萬一敢睥睨淨域肆口不羈寧知禪即淨土淨土即禪乎此舉世所共知者余安敢復贅一言但時有不等耳如云末世衆生心不懈怠堅忍力行即現世菩薩幸今正參居士篤志力辦自利利人弘願深銘劫石猶可移而志不可奪將十方國土衆生推入八寶池中無一蠛蠓可遺者此正參大願也諸大宗匠翰墨贊述出廣長舌余不敢為之續貂唯稍敘前案以相贊助今詢正參云若中忽突一人把住道我不入這寶社正參又將何處分喻指代云蝦跳不出斗一并書之卷末呵呵悟心説示仲言趙居士大道只在目前要且目前難睹欲識大道真體不離聲色言語故雲門大師云乾坤之內宇宙之間中有一寶祕在形山雲門如握利刃向群生千萬劫中昏夢顛倒直下一刀兩段無奈衆生迷沉既久把個妄知妄識活活認定甘將一顆明珠埋向糞掃堆頭急令渠收拾歸家拈來照天徹地奈何本有之性聞而不顧耶又於心外覓佛何異飯籮裏坐餓殺人不見祖師道森羅及萬象一法之所印心外無法滿目青山但能徹底掀翻決定飯是米做較余悟心之説總屬剩語矣明因果説示兗州不空禪人作有義事是惺悟心作無義事是散亂心惺悟不繇情臨終能轉業散亂總繇情臨終被業牽是以因若影果若形形隨影轉影逐形生善因惡因毫釐不爽有智者觀福業如幻罪性如幻法法如幻學者肯於洪波浩渺處探得源頭則始知三界惟心萬法唯識不隨邪業不昧正因因明果徹因真果實亦不撥無因果莽蕩招殃故諸賢聖於真智中興無緣慈破衆生惑不捨一法成就四無量心六波羅蜜轉不退轉若千源萬派總攝令歸于性海不取一法不捨一法取捨情忘登大覺位總不出汝最初一念之真而受果報亦如是也切今小智之流以報緣為幻縱心邪念平地墮生死險道長劫無出期分皆不信因真果實坐招罪愆應知法法不即不離如是住如是信解返照其本則百福莊嚴人間天上遍微塵國土而作佛事亦不離當人全體妙用得以無我我故行諸佛智則果因轉處即不屬情量彈指能入普賢三昧於始終絶其過患矣宜力行之寄示剖初臨終語法名德任侍師有年諸弟子輩惟士事師最謹士因病篤特至辭師而去師因愍其終始不忽隨寄示之法道離離而吾徒愈老愈堅惜今已經不起之疾幸晚年得聞斯法不為虛度矣但今放身命時須觀此身從頭至足皆不屬我而我此性亦不屬生死流轉不隨情愛所拘不屬修證不屬古今全體自在一切如幻回頭直下一覷返看是個甚麼無有一法敢當于前赤灑灑活潑潑十方坐斷一念無為即此是涅槃心如來藏更莫別尋頭腦十法界中總屬識情變現離卻心意識則全體金剛三昧王遠離怖畏謂之安隱幢保任保任切須著眼示唯讓張居士法名德悟大覺世尊昔捨輪王寶位十八出家三十成道説種種法門欲令大地群生咸知本有入佛知見以了生脫死為第一法然吾衆生罪根深重貪愛纏結不能當下消釋障蔽自心聞而驚駭因設三乘權學階級十波羅蜜門先以戒施為基以慈忍為戶以智慧為主令以精進為引導廣大其心普度其行任其險難終不退步直至成佛而後已此之謂大乘菩薩發心也第一先要信知即心自佛本來具足勿假他求若肯參從定為實證故六祖云清淨法身佛汝之性也圓滿報身佛汝之智也千百億化身佛汝之行也一身具三寶一體具三身總在汝自性中流出天堂地獄九有四生總不出汝自心變現方廣經云應觀法界性一切惟心造又云三界唯心萬法唯識袛如四大分張一口氣不來時畢竟此心歸向何處若不知這著源頭則三塗異類改頭換面業識忙忙無本可據豈不寒心故教公參句萬法歸一一歸何處不可須臾離此話頭迎賓待客穿衣吃飯一切處一切時緊緊靠住看這一畢竟歸于何所直得念念爾心心爾無一絲走作忽然用力不及時一朝話頭撲落原來秪是自家底勿待他處尋討然後將一切法看來悉是黃葉止兒啼信知不在色見上尋求音聲上卜度離人我相離是非相謂之離四句絶百非日用中顯露自性金剛三昧水流花開鴉鳴鵲噪盡是深談般若祖意教意悉在其中無有一法異同方始悟先天本不生後天本不滅亙古亙今法性迥露超生死關渡苦海岸因居士垂暮之年信篤皈投不免叨呾如此然遵而行之管取坐證但辦肯心必不相賺勉旃示文學大持金居士諱之銘吾人欲透萬劫生死關鍵貴於屏卻所習知見從空放下直得無一點膠柱向言前領略始解枯木生花更須透過差別知見方謂之了事人故大慧杲和尚平常教人參竹篦子喚他則觸不喚他則背不得有語不得無語道將一句來若擬議思量即被他當頭按住覿面千山應知此事如人立在萬仞懸崖相似拼得身心一擲驀然翻轉面皮信知眉毛只在眼上持翁信得親切遠來參請特為示此最要一著從茲但向吞吐不得處生佛未名時倒換眉目直待石人汗流則開眼不被人瞞洞見古人心髓矣時日不易祈自勗勵焉寄示大鑑玹書記子晚年慕進宗乘一聞便力行參究不為無根莖耳但參處支離病沉解路是以久而不見其徹滿地葛藤絆住回頭轉腦處不知利害更欲待時而悟豈不謬之猶甚如近代宗師家雖愈出愈奇大有古人作略而學人反經掣肘病在參究不真師家易肯也又以用處周遮難於決斷余昔參方時每每聞師家示人大疑大悟不疑不悟之語激勵後學雖悟必由此但亦宜著便若不隨問便按倒未免纍人大小疑處錯腳如平日學人一罅去不得時便是生死根本直下與他椎碎令其就窠打脫若再不能領略秪教他去不得所看是甚麼此便是銀山鐵壁處水盡山窮處和身放倒處轉關撥捩處時刻挨排偷心死盡直下便休豈有終身役役而不見其成功乎今以示子但向一切去不得處著些精彩直與一踏到底立地罷參豈不快暢若弄做婆子禪何日有出頭分勉之示亮上座子今既任斯法固宜篤志力行應處窮巖深谷頓絶塵緣不宜踏習輕狂裨販之輩一言一行必循古法切忌貶叱大方輕視後學亦莫好奇新句子誇誕一時貴於平日操之之深密向後行之之真實也如龍山一偈蜆子一機遵仰萬世豈在盈卷充笥為法式乎且古人綱要當細究之雖系建立一時蓋為千古法弊若用之正大則上下俱受益深矣唯道德可以服人山林之士日用聽其自然一味平淡襟懷直操古人不到之地庶不負佛祖之重任也已深囑示敏一居士居家修省十法師念近代塵中之士皈向三寶者甚廣恐其偏信近於理忽於事因示簡易切要以便其學以謹其行雖為一人説而與衆兼之之意蓋有深沐焉一觀身如幻泡觀此四大和合而成百年修短倏忽異世當一切處割截貪愛應念此身為衆苦之本智者視之驚歎業聚終不隨其妄緣作諸罪垢又念不假是身聖因難就要當急切究竟生死遷流把目前恩愛盡情拋卻總以住世如旅館驛亭若夢若影則道念必有趨進時也故云息心是道場破情是智域若受其倒惑則萬劫迷沉遞無出期矣噫可不慎歟二勤行須正見得聞是法雖宜旦暮勤求但不可希樂人天小果厭喧欣寂故經云不為自求願與大地群生齊成正覺此係菩薩發心也或云我本業力凡夫已尚沉沒不得解脫何能度人耶每至懷疑未下吾故宜曉之若人有萬里之程必起於初步將成萬仞之山必始於一簣凡夫發心初因若廣其願力久必培蓄深厚而證斯法是有不可思議者且凡聖雖殊途而其性不異要在其人力行何如耳儒云有為者亦若是從茲以往直至成佛衆生若盡吾願乃盡聽其順逆愈久愈堅進修吾道決無退轉正行正見勤而行之永無舛謬三皈依三寶力三寶弘名吾人於六趣中最難遇者一聞其法能消八萬劫生死罪垢能越長夜苦海能趨無上菩提總經塵劫讚莫能窮蓋吾佛以難行能行難忍能忍天上人間歷諸苦趣為求大法故為度衆生故乃至捨全身而求半偈并於捨國城妻子象馬珍寶至身為床座作驅役使忘形忘世力求佛道而乃得成大覺世尊十號具足為天人師作群生主吾人業海汪洋沉埋既久是以正法難值佛寶難逢若芥子投針蓮生火內今得皈依寧不生慶幸歟法寶者從如來金口敕宣教乘列三藏法非此不能超生死別邪正若杲日麗天破諸昏暗若甘雨降注普潤群根得逢一言半句可證本有圓明是以受持參究利益無涯大藏靈文慧命所寄聞之者寧不惕勵奉重歟僧寶者十力弟子因僧得以續佛慧燈因僧得以弘揚正法因僧得以普利人天是以沙門悟其本源與佛無殊作世福田破諸魔外人間得以參求引導迷津住不退地遇之者焉可得而輕忽歟乃至人間天上四生九有莫不仗是三寶恩力以濟其厄難故篤信皈投探其法味受益始深如一體三寶佛者汝能覺悟自性則佛寶不離汝身汝能深透疑網則法寶不離汝智汝能會歸萬法則僧寶不離汝行日用頭頭本自具足不假外求此即自心之三寶也擴而言之不出乎此惜世之愚昧者障蔽塵勞驕慢橫肆視三寶如蠛蠓聞而不之敬信一生報盡萬劫何從因表而出之以為深世趨進之階得依斯法者安可忽諸四具戒不殺經云五戒不持人天路絶曰不殺不盜不邪淫不妄語不飲酒食肉此五者即與五常名出而異同賢人君子早已受之之矣目為佛戒難持豈非朝三而暮四乎若欲希人天報緣非五戒十善則人天無路況欲求妙道而勿謹持且天地之道德莫大乎好生過莫大乎縱殺唐相國裴休云凡血氣之屬必有知有知必同體雖業報不等其性本同我等幸居人天之中而貪餐口腹恣意妄殺下箸千命或賞時日或慶家祐或抱疾獻禱種種嗜好此皆自不覺其大患居家最要一門無如戒殺行一切善莫越放生祈福祈壽莫外乎此兼於慎言節行禮樂衛身生生無夭折之悲世世無顛覆之難既秉戒法當盡形受持勿生異念至死不移總孝子順孫或逢疾難亦莫惑巫師星卜醫家邪説毀其戒品且吾人壽命有定限安可烹殺肉命而救延之若是則茹葷之輩壽必齊老彭齋戒之流夭必共殤子矣智士決不然其説仁慈君子乃至蜎飛蠕動尚且護惜況鱗甲羽毛乎以下四戒法一宜如實行之欲登聖果先息業因審能如是何慮道之不證也祈五濁生民普宜覺察幸甚五持誦不怠平居持誦必精必專晨昏當有規則如閲經時深其味不必定其卷數日朝起時焚香整衣頂禮十方常住三寶深祈冥薰加被室中莫令聚談賓客混入經筵徐徐朗誦不急不緩誦畢復發弘誓願回向九有四生均霑法樂如念佛時不可同於村童灶婦隨口遊念必須一心觀行經云執持我名若至七日一心不亂即得往生生彼國已見佛聞法悟無生忍持誦功行豈淺淺哉必宜禪淨兼修心淨即佛土淨心外無別法正當念時看我此念畢竟是誰若今是我何有昏迷若今非我何人主宰畢須將此一句念念追究佛之與念打成一片行住坐臥無暫時捨忽朝㘞地一聲悟取本來是佛了知西方秪在目前彌陀不離當處方謂之真持實究但功到必圓辦取一番久久不退之志自然心華發現參持一理宜相互融毋忽諸六禪觀力參禪那二字西竺梵語此土即云思惟以正念思惟究竟其法祖師云以思無思之妙返思靈焰之無窮思盡還源即如如佛謂之最上乘禪謂之心地法門達磨大師來此土傳是心印直指人心立地成佛昔大梅和尚初參馬祖云如何是佛祖云即心是佛大梅言下領旨一住大梅三十載草衣木食形影不出學人慕之往參其道後開法嗣馬祖此即一句頓悟的樣子如龐蘊居士參馬祖悟後有男不婚有女不嫁一門其證此居士中赤螵也個事若大鵬金翅鳥王劈海直取龍吞手段方名好手是以一言之下便當休去歇去今之發心入道者最初無決定志無廣大心若後將何如也不得已開第二門教汝參一句話頭東咬西嚼久久目明又惜今之士苦其道之高遠一生安可了決乃至望崖退者何啻萬千信知此事須大根器人方可提攜如教中云禪定譬於水之澄湛始可鑑照萬物一受風波鼓扇本體尚迷況能鑑物乎吾人無始妄想惡因結聚如風鼓濤欲其返悟自性如負石登山故必假禪觀參一句子無義味語日久功深心志用竭行到水盡山窮則方能觸發其源故儒云用力之久一旦豁然貫通斯言盡之矣欲成佛道除此別無可進者當無惑焉七植福資道祖師云實際理地不受一塵今事門頭不捨一法欲求大道必假福行為基址百福莊嚴福足慧足故佛號之曰兩足尊學道之士捨難捨之緣屏其世樂始有進趣般若經云如我昔為歌利王割截身體我於爾時無我相無人相無衆生相無壽者相方其時也內不見可愛之身心外不見可欣之利欲全身放倒唯道是從此事法也又于斯中表金剛旨忘我忘人全體不立斯理法也為法忘形視身尚爾身外烏足道哉乃至種種惠施濟諸苦難滿彼所願操之蒂固根深方得悟無生忍若根器卑劣者遇之未能信信之未能行行之未能到故曰水之積也不厚則其負大舟也無力斯言備矣從古聖賢必從檀度為始先令汝去其慳貪所重者則根塵器界無往而不解脫矣道之所行宜廣其福八割愛如讎涅槃經云無明郎主恩愛魔王從生至生遭其戕害故吾人愛網纏結昧卻本真一受其毒沉淪不已是以修省欲離火宅惟此愛根甚難割截乃至頭白齒豁死門在即尚爾念念不休作馬牛之自甘為奴隸之所願總大智人十有九昧況無慧者經云有愛則生愛盡則滅如夫妻子女人倫之大綱為之世紀何以謂怨仇恐喻之不亦甚乎曰非也以人倫道中則君君臣臣父子夫婦以修道者固當別論如忠孝之士殉身救父衛國匡君立名萬世人道備矣若出世之學辭親割愛捨己從人以度諸有法道全矣是以出世之學故能弘通大乘超脫塵鎖不同世議要之趣進妙道未見情愛封固而得有證者念吾生從朝至暮從少至老從生至死從貴至賤從貧至富役使身心無暫時捨至睡熟時夢中尚遭其顛倒過在誰歟眼見日喪而日不知日迷而日不覺深入骨髓總經塵劫牢不可拔謂之肉刺謂之軟繩我佛目不奈看因於世諦示現王宮捨身救度若是標式尚爾執迷是觀愛之為害甚大乃至入四生異類改頭換面逐影隨形患難不捨迷倒無已故云割愛如讎必於正念返觀生死臨頭最親不可少代則恩愛必冰釋矣噫可不畏歟九時日不怠人世光陰如白駒過隙死生猶有旦暮也一失其所受則萬劫淪喪讀之可不寒心是以莫把光陰等間虛棄少壯者時日不再更不可忽老衰者桑榆暮景轉眼難留尤為急切總之有一息在當究一息除死方休般若參功他世決不負矣惜乎舉世之流終身役役而不見其成功爾然疲敝而不知所為使與接為搆日與心鬥惡緣遍熾白首徒歸總不出於聲色貨利而作業因往而不返埋沉黑暗寧不痛哉適有上根智士留心性命之道十有九錯或墮空著有或尋文局相或入邪異見誤用其心神未蒙其益反遭其毒蓋不得遇真正師匠提掇要門揀別邪正往往陷害其過非細若用功夫不必論時日之遲速以為利鈍古之上士或十年五載而後悟者或有不假年月敏捷如矢者或一生剋苦而無成者蓋其根基不同利鈍非一果能決志力行遠近必到先德云佛法無多子久長難得人每當自念有識神以來身所受身積骨如山所飲母乳如四海水異類循環靡不歷盡幸今得聞斯法可脫生死安不努力勤修甘於放過今之所忽後之所迷恐終不能遇於此日也無論少壯衰朽固當勉力行之般若種子從此發芽祈繩繩不懈道可圖焉十道宜專一道若專一則操進必正而無雜亂是能貫通真際如法華云惟此一事實餘二則非真終不以小乘引導於衆生佛説種種法為明一切心若悟一切心焉用一切法禪家令參一句子秪要打脫鼻孔徹其底蘊應知此著為我抽生死根拔無明楔一朝撥轉煩惱即菩提衆生即諸佛唯在離心意識參絶凡聖路學無理會無方便唯存篤志疑究不被餘見所惑蕩盡倚依忽地翻身不一不二名不得狀不得故云千峰勢倒嶽邊止萬派聲歸海上消然百姓日用斯道不自知者如魚之在水而不知水人之在性而不知性魚若知水則為神龍一滴便可興雲吐霧灌注大千人若知性則為至聖便可度生死超天地允執厥中要明喜怒哀樂之未發即一也天命之謂性即一也凡有血氣莫不尊親故曰配天即一也道可道非常道即一也無我無人即一也總之聖教單明道體除此盡為魔説然吾斯論悉是言句上支離畢竟如何是一居士能敏於一把將山河大地納向微塵中佛祖無下口處道一亦是空拳誑小兒則山僧退身有分如是始不負今日一會儼若靈山話柄葛藤一併按下幸甚幸甚示重南金居士諱液古德云大道秪在目前要且目前難睹欲識大道真體不離聲色言語此處悟徹者甚多錯會者不少如石火電光迅馬疾風作速攀鞍入手尚且遲了八刻若欲琢方削圓則何時得有進趣是以令公參一句無意味語如庭前柏樹子為甚喚作祖師西來意提起時如足履懸崖放身命相似直下無依倚顧盻向未舉已前一腳踏穿心智路絶驀地打徹始知全身總在裏許飯籮邊終不餓煞開眼處豈教墮塹若此道個西來意早已鈍置了也何處更討千七百則陳年葛藤東扯西拽但向居士道若有佛法商量亦錯若無佛法商量亦錯畢竟如何即是咄錯錯錯切忌河邊睹影偶閲寶王論兼示禪徒易曰天行健君子以自強不息至哉言乎學道之士若不堅忍身心磨勵形質而欲坐證斯道者吾未之見也且古之聖賢降世雖曰本具天聰及其操進時靡不披歷險阻勞其筋骨餓其體膚名利不干懷聲色不為動志若泰山之不可移念同金石之不可易愈久愈堅是以功成一旦得弘百世之教綱成千古之模範非同近之驕怠縱情者便欲所期不亦謬乎且往往小慧之流足不越戶意跨江湖情量未超擬吞佛祖因而十學九虛白首無成適有所似如槍榆之決起擬將怒飛九萬里者何有於事蓋其昔因不正大而後之進取不過如是耳然吾人所居學地每事必先居於礙若不居礙則生死險道何由出離故如來於障難中得菩提道若歲寒見松柏之獨持以其能履霜雪故不為之披靡摧滅勉若輩力行之庶幾報佛祖深恩於萬一也勉旃佛事為蕺山天柱維那封關蕺山帶水拖泥露柱子證明有口不道辨峰裂出布袋角山門頭佛法一覷便休既是全身擔荷何必別翻腔調不見道保任此事終不虛也遂封庚寅仲冬七日奉護國先和尚位入先覺堂師捧牌座云毒鼓高撾數十秋啀喍辣手剔生繇橫封台嶺驚寒拾夜半金烏六不收恭惟先師嘯老和尚握辨嶽祖符主天台法社唱導四剎傳法七人向時拈頭作尾將個骨董傾入九龍佛窟不肖今日平空捺倒推阿爺向密室內納甲藏鋒即安座云祖父券書一并按下護國老和尚忌日拈香凄凄風雨連朝瑣柳吐煙絲穿太古萬山愁斷碧空浮碎破溪聲未遑補指真云這老漢平生辣手慣拈兔角打蛟龍午夜歸來卻把龜毛鞭石虎今日末後拈提莫便秪這是否錯錯插香云把將底事更重拈冤有頭兮債有主清辨大師計至設供鴻雁斜飛嘹亂一聲驚落葉秋江清淺數灣野水貯流雲交參無路透清波砟額長年不出戶冀我法叔立身孤徑常嗤法印之續貂末後森嚴不顧獅絃於絶響臨行雪曲和者成希祖父全收許誰突眼召衆云要知大師末後句問取庭前露柱子離愚大師訃至設供嶺外寒梅不到春城先墜萼扁舟漁火未拋香餌已收綸袖手持書不到家展足斷碑橫古路恭惟法叔印佩華林源承石傘掃魔外之餘蹤指人天之露宿正宜敲唱雙行何爾全身歸父還鄉曲調句可驚人功位不施密移一步大衆秪如古殿苔封萬機絶唱時何處與大師相見舉香云朵朵瓊花開鐵樹回途不借夜明簾掃大地山受業師翁古岑和尚塔束芭茆孤峰頂上不見海內一人煮砂鐺大地巖阿要與高峰同調天華未肯承當博山安能下釣昔日如是雄風凜然難犯今被不肖兒孫團起捏倒拶得沒處藏身雖然也要承先儀表乃展具云千枝翠色函鐘秀萬派溪光供遠峰為武林遍周耆宿封龕濛濛煙雨瑣鐵壁以無聲寂寂垂揚穿金針而暗度虛空突露萬象橫身驀面相呈有口不道遍周老宿樂與不輕之拍和兼依普化於當途今日關頭一齊按下遂封云路絶雲封敲石韻密移一步任縱橫為桂輪禪人下火秉火炬云撩空潑面來撒手懸崖去脫卻殼漏子千聖無覓處擲炬云斫斷桂輪影如是不如是觸背俱非如大火聚贊偈雜著始祖釋迦文佛贊受印燃燈全身活賣降迹皇宮平空捏怪指四維盤曲根株睹明星漆桶不快稽首無上薩婆訶試問虛空壞不壞笑伊塵剎分身事不休大都欠了百萬人天命根債水月觀音大士像贊水月慈容千波透徹現自在身斷生死惑於一念頃成勝十力洛伽山是定非定大千界無出不出百億須彌百億海百億法身無間隔如是之謂大身小身遍身化身聞聲證此無礙光普為人天作饒益題十八羅漢渡海圖瑞雲居士請破寂滅法固未是擔板阿師具三昧力還疑汝捉風捕影性若月輪而透千波萬波之獨照用同寶鏡於現有作無作之功勛受人天供為苦海津鬼臉神頭乾打哄一槌腦後始相應震旦初祖菩提達磨默然一渡海山愁冷冷風雲事未酬百萬人天俱失足大千龍象贅瘡疣擎頭帶角不盡不休五葉一花成痼疾這般面目惹人羞雲門湛老和尚無説而説口同鐵橛宗通教通頽綱斧鉞滿世界知古佛之再來暨賢愚謂真人之復出到處便成道場從之雲屯霧集整曹洞千百餘載門庭起少室四三淵源寶筏呵佛罵祖決盡衲子偷心打雨敲風脫卻人天巴鼻咦看來秪是個村儂仰望其風甚不及護國嘯老和尚凜凜真風嚴霜六月密密鉗錘紅爐片雪四坐梵剎雷轟電掣觸著喪機聞著腦裂玄要驅除明暗頓絶三十年中聲價孤全身不露誰明的誰明的室內承褫六七人都來秪識半邊鼻自題夢宅圖貌若枯巖心同頑石努嘴突睛秪好向壁作事起倒最多參玄沒路可入道個曹洞兒孫早以虛空釘橛呵呵不若推向窮山窮水束芭茆活埋個樣行藏免得逢人説黃説白捏烏藤挑起沿途荊棘梵光闍黎像萬行嚴身戒光全體一念無私松風知己半架枯禪你是誰梵音唱徹絶事理含章禪士行樂翠竹刪刪迥真常之妙理青山鬱鬱發海印於毫端兀坐蒲團印文已布僧伽半搭戒體知圓分明眉目不墮其間咦苔斑點點萬年石古澗潺潺流水間大鑑玹書記行樂棄儒冠易僧服大錯不錯參有句參無句沿門賣卜高峰惺睡句子蚊子咬鐵牛曹山四禁關頭玉兔生麟角眉毛不同鼻孔倣佛玹書記鑑照不共功銀籠飛老鶴雪月蘆花謾跨雙足鎮府樊圓證居士行樂法名德密秉正不私心平口直武偉雄聲韜略有則觀富貴若浮漚叩禪關如舍宅唯此為真終不受惑咦本來個事甚分明密諦應知在格物瑞雲史居士行樂這個烈漢頗甚奇特不逐危險慣吞栗棘登辨山室裡掘地討天展臨濟句中平空遭屈是僧耶現居士身是俗耶袈裟半截解補龐公破笊籬撈得西江第幾月雖然不坐他床榻其奈一虛成百實喻指雪上加霜瑞雲眼中著屑咄和中峰國師樂隱辭十六首松竹煙籠密顯心宗通玄路達者堪逢兩頭截斷不墮頑空看有金針有玉線有神鋒躡履窮峰衆竅喁風蓋芭茅樂在其中冷消世味幻視塵蹤喜雲如幕石如虎柏如龍瀟灑無羈木石同棲寓間情花鳥忘機青山排闥蘿月穿扉卻絶支離絶己是絶他非抱甕翻齏糲飯相宜蓬垢面表裏無疑推雲覓徑呼谷傳嬉看魚能遊兔能走鳥能飛峭壁層奢樵斧丁譁待寒暄撩補袈裟瀑充機軏日擁輪車我不知毀不知贊不知誇藤刺交加緣雨新芽響春雷苔蘚生花洞雲山岫巖月還家唯自為賓自作主自烹茶種粟供餐稊稗應刪植靈苗緑水長關生涯钁底遁世林間我寸時功刻時用得時間覷破非艱實踐猶難負舂翁道振塵寰兒孫遍地折節沖關時有雲門有臨濟有曹山翠襲山樓花藻簾鉤觀麋鹿逐隊藏幽蝸文篆壁石乳傾甌喜竹搜風香溢戶露垂秋透篾聯笆問圃栽花聽翻空鶴和聲斜山屏裂錦水鏡增華間採春芹採春蕨採春茶悟後方休識蘊齊勾髻中珠奚假他求一真不立萬法非儔我得和光得混俗得優遊匣吼青蛇寶印重加碎珊瑚挂月奚奢機隨根性用本無涯或目滄溟目霄漢目雲霞頓絶商量體用渾忘示玄關獨踞胡床烹凡煉聖倒腹傾腸值有天風有松月有爐香道出平常懶散非狂枕松根午夢偏長怡情丘壑隱迹山房得樹生陰風生腋石生涼徹底研窮此理皆同貴拈提本分家風烏玄鵠白柳翠花紅看緑荷蕖赤芍藥碧芙蓉巖室蒼翁給侍山童絶塵緣志逸身慵形超物外意可虛中鄰一溪雲一溪石一溪松太尹金百陶老居士致書問云非特睡時難醒即惺時亦爾師以偈答之開眼非惺合眼非睡萬里神光本無偶配金鎖玄關一捏粉碎才涉思惟便墮圈繢不假功勛理事圓方知有作非尊貴寄贈佛川和尚憨石法兄祖印高提碎杌檮七牛作犗釣金鰲漫天網子從空撒知有新豐聲價高贈祝霞幕和尚克歸法兄六秩野山退隱於茲排峰石老雲間弄誰憶春秋甲子肥倚杖快情松澗雨隱深不羡釣漁磯示禪人這邊那邊總不居魔宮佛殿俱撲碎應憶吾人行説難深履其源莫向背色裡膠青水裡鹽向上一關超暗昧贈湛虛大師嗣夾山伴和尚辨峰室底流芳遠資福堂前結秀多寶印摶空君佩久無絲機杼擲雙梭贈靈巖記室檗菴大師磨衲半肩消珮玉頂門有眼不慚師直沖玄要爐錘盡千古黃龍道在斯示副院齊之弟石筍忽抽條露柱被雷震證得玄中玄當機能奮迅本是同根生剎竿為誰瞬辣倒寶壽薑祖風源有胤示香濟禪人書法華經巍巍大乘旨用處不存迹雖説有三乘總是化城驛空拳誑小兒上根能返躑若一涉言詮龍門遭點額總之智慧門難解復難入藥王焚身時身見且不立佛法不現前大通碎囊革剝皮以為紙唯此一事實刺血以為墨曹源傾一滴不悟大乘法棄珠尋瓦礫諸佛體中權今古不曾隔我勉濟上人臨書莫著畫一朝徹髻珠毫端起霹靂示亞目侍者鹽官索扇問犀牛今古同聲接上流返躑貴知綿密用履深唯在芥針投身心惕勵承先訓志念純真操不浮珍重兒曹須努力直教奮勇紹箕裘示趙傑菴居士法名德偉丈夫有志必先為莫待臨行失卻期果是獅兒真種草何須覿面下針錐題磨無縫罅中呈露布裏許暗合兩頭機輕輕撥轉通回互密地行來步不移題聞普上人血書法華經大哉空王旨能闢生死路絶我疑網城破我愚癡庫甘雨潤焦枯雷音解禁錮誠如火中蓮難植復難遇得有普上人身心渾不顧刺血頓忘疲唯知依藥樹為求無上道究竟堅固住點滴驚鬼神舒卷悲日暮透此無量光心珠常獨露筆底若通玄大千俱受度建喻指庵碑記像法南來佛道始繼先於教乘開闢茲土而繼吾學佛之徒若知其玄旨者則稍有進趣焉蕭梁之世達磨來是震旦傳佛心宗以致五燈分化悟者如稻麻竹葦潛修密證遍滿界內正法之盛於是淵源不絶其間抱道之士或居梵剎或住山林或聚落或庵宇或順行逆化應被十方摩肩接踵力救吾人沉沒苦海蓋其悲願弘深俾見聞者得以超生死之域深受其益者無盡盡焉然庵居隱所雖不能悉處有道之士而三寶弘名亦日貫於眉目矣余解院東歸道抵黃溪適遇昔於羅漢寺之參請者振綱姚君即天與也斯翁酷嗜宗乘里中莫己知者與余深接因詢所止曰師將歸天台耶將設化四方耶但兵燹之後住山人亦多患難不若隨地安居作芭茆計未審若是可否余欣然允從復云但宜擇地而居可也士日諾嗣後雲山史翁皆前皈依者并瑞雲史君亦洞下一龐蘊之屬相從表裡集同十友擇定其所去黃溪里許地名南港居鄰純朴衆議僉同靡不欣輔乃平基創菴不日而功告成約費千金有餘兼施田畝永作齋廚之供俾後繼者不乏所須間有月上人迎毗盧香像供奉於中儼若符契其事亦非偶然者余即於癸巳四月佛誕日居之額曰喻指深幸諸君道業倍增佛事益廣余就中隱關三載作杜門計息以自勵而邑中士大夫與余遊者吳金沈史諸君子詢參個事亹亹不竭莫不以斯為最勝舉也噫若是觀之豈非法界唯心者乎昔諸公一念之善願等金剛久久無能摧滅者其因其果亦若是矣雖創業大小有殊而篤信本來一轍願現在諸賢暨後來檀度永作金湯深護聖教母使流俗來儀混同庸處務行廣大佛事以為多生福澤線遠於千百世之下終不磨滅誠如是即靈山一會儼然未散也是為記助刻姓氏弟子張德悟金之銘比丘尼惺巳黃溪弟子智化德愍德綸德繼德胤德皎智利德任德越王氏蔣氏馬氏惟祈早證無漏因同圓種智者
