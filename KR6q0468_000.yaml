front:
  text: 攖寧大師語錄敘喻指和尚荅三峰曹洞十六問序明道貴契乎真虛履踐宜切乎真實故法言有三設問有四法言者始寔而終虛道之至也始虛而終實行之至也非寔而非虛化之至也是以至人其心若鏡其心若水包括六虛體備群表言而世為天下法行而世為天下則雖終日言而未嘗言也終日行而未嘗行也至人無已而無所不已也發問者苦臨岐而預扣辨真偽以明宗搜玄奧於未始畏濁亂而迷流睹万里之神光急欲知其所止聞一言而冰泮灼然水乳相投飢不擇食飽即便休行不論程到家事息學者全是問始忘言技空乃盡舍此別立門墻翻新豎異朱紫之亂害莫甚焉斯道也非深徹乎元始終垂白而未明智者超然愚者自昧適扣喻指和尚參請之餘師以荅三峰扣雲門博山曹洞十六問示之其問也海內寐然無聞幾十年矣喻指續荅万言豁人之所未豁余讀之悲喜交集不意垂老得聞極則事和尚以士薦嗜斯道合為弁言余退而辭曰三峰問實中之虛和尚答虛中之寔如麟經載筆尚不能贊一辭況格外音響乎師云此三峰一字誅心不可云權中之實惟公委之余閱之者再退而啟曰聞命矣今聊指三峰一言以明其發問之始五宗原敘并結中以曹洞到浮山而率賓歸王法眼雖入教而難逃至化唯此一事實餘二則非真臨濟兒孫既專大任敢負前宗每讀至此余更愕然豈投子之荷洞上何其不昧任耶豈法眼之引教乘而絕不明其宗耶滅他宗為臣妾任濟上獨薦王耶當此二桂交陰急欲伐其左以右自豎耶噫是何心哉春秋之世三尺童子恥言五伯況證無我之道一何其陋耶返而思之恐非法門盛典斯哲人之病已夫寥寥諸方絕不與之對偶獨得喻指是答誠揭千古隱疑絕萬世異議學者斷斷焉能荷其任者竟篇靡不汗服茫然負我者一字不是為與三峰以洞山未睹影而傳寶鏡總入室而伏繩床好箇鈯斧子不當斷削古人至此誠自負而負人以無我之中疊起人我恐非真我也率賓而欲一當其住不忘過歇余泛旁贊云賓則始終賓主則始終主因其好之也一故頓起空王之玄吼破影響之鳴條大匠運斤不無其舉使郢人之堊漫谷繩翼者隨風撲落庶不再嘵嘵白日挑燈汲汲而自失照矣幸天之未喪斯文也丕歟法道干城猶當勁敵一面檇李參學門人姚上士拜撰于穆溪之天與堂蘭亭學人劉肇茲書敘夫法運有隆替王化有春秋非獨今日為然也當宋興以來海內宗匠亭亭雲湧傑出前人祖印雖為一新未免雕文喪德時有徑山杲師振起先猷一掃諸方盡除餘蔓不僅他宗可斥即其本師玄義亦不容露布況能並躅於東鄰乎然而每輸誠于天童覺老人者抑天何耶當陰萬時祖道凌夷雖二三主者砥柱其間慣使沒意智一著其于玄位旨趣不欲提撕誠恐流入曲學礙正知見五家宗眼晦不復明如三峰藏老力持玄要轉叩君臣逆排太白為橛頭禪如師子兒反搏父肉其能遺象王而不顧乎然而偏折節於雲門澄老人者抑又何耶嗟夫藏老去世未遙浚生晚學尚能見聞其志行至於杲師每夜參時呵摘諸方音首座不禁含忍起而數之杲師為之禮謝浚于衡陽得旨返杖淛中諦交天童仰契長蘆杲師之意蓋可知矣前乎此者雖赴一參之請快一時之舌晚年自省未必無失言之悔也余忝主弁山以來每慨近時學者不識自宗唯務儱侗賓主君臣之旨幾于掃地時養痾麻溪亟欲提撕適吾姪攖寧禪師讀荅三峰啟雲門師翁十六問以質余細閱一過且喜丁斯秋晚詳悉斯道也而有斯人也吾宗不致寂寥矣第三峰設難喻指覆辭兩造之竟不過提掇綱宗庶幾開俾來學原非偏逞臆見而然把卷者別開心眼庶有發明且其首以雲岩先傳寶鏡而復以過水得悟為洞山之漏逗再援大慧片言以欺壓之夫不知洞山辭雲岩時非無悟也於過水時更有玅證也猶夫大慧于圓悟處非無悟也于閱經時更有妙證也不得謂大慧于產難因緣尚未明了天寧遽爾妄授耶又不可謂大慧只會得勤老機緣尚未徹準師用處耶他如南匾額獲三昧於獄中洪遷客入無生于海外皆在得法以後之再證未可枚舉豈止洞山為然哉今人中道自畫一知半解得少為之撞著顢頇長老一印印定便有一種權魔入其心腹自謂證悟無遺者滔滔若與敗種又安敢以偃鼠之腹妄測江河耶果能悟洞山之所悟則知兩家鼓舞酬唱如紅爐片雪閱者自宜審諸席林玄素體道人書于麻溪之明慶寺攖寧禪師語錄序佛氏出離生死誘人超劫大指與儒本同顧其作用既別流傳浸訛傍佛門戶僧非真僧猶假儒衣書士非真士也孝不喜譚佛法獨喜讀曹溪壇經喜其自為佛而不障佛魔挽諸迷眾歸之吾道所以云救也故嘗謂韓昌黎之排佛盧曹溪之說法其道一也故謂曹溪儒者也其對仕流疑問直教以孝義修行迺真其志也若猶是遺棄倫物是則昌黎之所闢者耳故嘗謂護佛法莫昌黎若也攖寧大師受法於曹洞宗源印繼以正法眼直指全提所有法錄并答三峰曹洞十六問契理契機佛祖慈航聖學至教悉抉統貫世間出世皆有証入之門上智下愚盡受平等之法嗚呼盡矣邇來緇流習沿師承大壞楊子之鄰人亡羊既率其黨又請楊子之豎追之楊子曰亡一羊何追者之眾鄰人曰岐路之中又有岐焉人有濱河而處者習於水勇於泅操舟鬻渡利供百口裹糧就學者成徒而溺死者半本學泅不學溺利害判絕若此嗟乎大道以多岐亡羊學者以多方喪生大方明眼須深知師旨毋徒為心都子所歎哉賜進士第河南道御史於越學人劉明孝拜題夫百尺之枝忽施纖蔓大圓之鑑瞥滓鄰塵苟不辭而闢之俾葛藤斬盡浮翳全融深恐兆妄滋惑復增一則未了公案亦後死者之責也然非慧同鶖子語若懸河智過於師正不許輕下註腳何以故南華云彼亦一是非此亦一是非與其譽堯而非桀焉不如兩忘而化於道雖然衛道則烏容不辯辯道之言不厭其多非貴于多貴於徹也言徹則多言消歸少言少言消歸無言矣三峰藏老無事尋事向吾湛祖啟問十六自賣破綻祖答姑置以俟來看不答之答業已雷震虛空日炎碧漢初不藉後代兒孫補綴狐裘淬磨歐冶峰迺詹詹間間遂謂諸方無可激揚傳諸後五百年沒眼禪和揣籥摸象以為真有不易答者豈不笑殺井蛙誤殺醯雞耶吾姪攖寧和尚忍俊不住析疑剖惑直窮到底無復剩義重開湛祖之口可使吐舌覆面重提藏老之耳堪令三日耳聾或疑抨駁先哲支離義諦非掃除文字與無諍三昧之旨不知置之不答將啟答於無窮有此一答可掃後來欲答之端倪併掃前輩垂問之影跡喻指固忠臣祖禰非操戈藏老也不特喻指未嘗有答即謂三峰未嘗有問也可弁山睦堂淨瑩題攖寧靜禪師語錄目錄第一卷蕺山戒珠寺上堂十篇小參三篇吳江喻指菴上堂五篇茶話四篇第二卷黎川羅漢寺上堂十三篇第三卷眠牛山結制小參七篇示眾十六篇第四卷拈古三十四則頌古五十五首機緣十七則第五卷法語二十二篇佛事八則贊十二首和中峰國師樂隱詞十六首偈十二首碑記一則第六卷續荅三峰曹洞十六問并著頌目錄終
